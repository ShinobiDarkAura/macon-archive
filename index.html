<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maçon · Bureau of Provenance</title>
<link rel="icon" type="image/png" href="logos/crest.png">
<link rel="apple-touch-icon" href="logos/crest.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  @font-face{font-family:"Louize";src:url("fonts/louize.woff2") format("woff2");font-weight:400;font-style:normal;font-display:swap}
  @font-face{font-family:"Louize";src:url("fonts/louize-italic.woff2") format("woff2");font-weight:400;font-style:italic;font-display:swap}
  @font-face{font-family:"DM Mono";src:url("fonts/dm-mono-300.woff2") format("woff2");font-weight:300;font-style:normal;font-display:swap}
  :root{
    --ink:#2b2622;
    --paper:#f4efe4;
    --paper-2:#efe8d9;
    /* shared by the alternating ledger rows, the drawer bg, AND the ledger/provenance toggle — keep them matched by editing only this */
    --row-alt:#f6f4f2;
    --bronze:#8c6a47;
    --bronze-deep:#6f5235;
    --slate:#5b5a55;
    --rule:#dad5c9;
    --seal:#9c4a3a;
    --accent:#db6b50;
    --accent-deep:#bd5440;
    --high:#e9d9c2;
    --shadow:rgba(43,38,34,.10);
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
    --serif-display:"Cormorant Garamond",Georgia,serif;
    --serif-soul:"EB Garamond",Georgia,serif;
    --mono:"DM Mono",ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;overflow:hidden}
  body{
    background-color:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    font-size:16px;
    line-height:1.55;
    /* subtle paper texture + column gradient: flat light-white right of the seam, warm paper left of it */
    background-image:radial-gradient(circle at 20% 10%, rgba(0,0,0,.012) 0, transparent 60%),
                     radial-gradient(circle at 80% 80%, rgba(0,0,0,.012) 0, transparent 60%),
                     linear-gradient(to right, var(--paper) 0%, var(--paper) calc(19vw - 116px), #fefdfb calc(26vw - 72px), #fefdfb 100%);
    -webkit-font-smoothing:antialiased;
  }
  body.has-ticker .wrap{padding-top:34px}
  body.has-ticker .col-right,body.has-ticker .col-left{height:calc(100vh - 34px)}
  body.has-ticker .drawer,body.has-ticker .drawer-rail{top:30px;height:calc(100vh - 30px)}
  body.has-ticker .sync{top:44px}
  .ticker{position:fixed;top:0;left:0;right:0;height:30px;z-index:60;display:none;align-items:center;overflow:hidden;
    background:var(--ink,#2b2622);color:#e8e2d6;font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;
    box-shadow:0 2px 10px rgba(40,37,35,.25)}
  .ticker.show{display:flex}
  .ticker .tk-track{display:flex;flex:0 0 auto;white-space:nowrap;animation:tk-scroll var(--tk-dur,40s) linear infinite}
  .ticker:hover .tk-track{animation-play-state:paused}
  .ticker .tk-item{display:inline-flex;align-items:center;padding:0 28px}
  .ticker .tk-time{color:#d8a868;margin-right:10px}
  .ticker .tk-dot{margin:0 0 0 28px;color:var(--bronze,#a8845c)}
  @keyframes tk-scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .daybrief{position:fixed;top:66px;left:calc(4.5vw - 24px);right:auto;z-index:55;width:calc(21vw - 28px);background:rgba(252,250,245,.38);border:1px solid var(--rule);
    border-radius:12px;box-shadow:0 18px 44px rgba(40,37,35,.22);padding:22px 24px 28px 30px;
    -webkit-backdrop-filter:blur(14px) saturate(1.1);backdrop-filter:blur(14px) saturate(1.1);
    animation:db-in .35s cubic-bezier(.2,.8,.2,1);box-sizing:border-box;
    transition:width .38s cubic-bezier(.2,.8,.2,1),height .38s cubic-bezier(.2,.8,.2,1),padding .38s cubic-bezier(.2,.8,.2,1)}
  .daybrief.min{display:none}
  .daybrief.min>*:not(.db-icon){display:none}
  .daybrief .db-icon{display:none;border:none;background:transparent;padding:0;margin:0;color:#000;cursor:pointer;line-height:0}
  .daybrief.min .db-icon{display:block}
  @keyframes db-in{from{opacity:0;transform:translateY(-46px)}to{opacity:1;transform:translateY(0)}}
  .daybrief .db-kicker{display:inline-flex;align-items:center;font-family:var(--mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:#4f7d57;background:rgba(79,125,87,.13);border:none;border-radius:999px;padding:3px 11px;margin-bottom:9px}
  .daybrief h3{font-family:"Louize",Georgia,serif;font-weight:400;font-size:29px;margin:0;color:var(--ink)}
  .daybrief h3 i{font-style:italic;font-size:25px}
  .daybrief .db-rule{border:none;border-top:1px solid #e4ded1;margin:8px 0 24px}
  .daybrief ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px;width:100%}
  .daybrief li{position:relative;display:flex;gap:13px;align-items:baseline;width:100%;font-family:var(--sans);font-size:13px;color:var(--ink);line-height:1.35;cursor:pointer;padding-right:24px;transition:color .15s}
  .daybrief li .db-check{position:absolute;right:0;top:50%;transform:translateY(-50%);opacity:0;color:#a09b91;transition:opacity .15s;pointer-events:none}
  .daybrief li .db-go{position:absolute;right:24px;top:50%;transform:translateY(-50%);opacity:0;color:#a09b91;transition:opacity .15s,color .12s;cursor:pointer;border:none;background:transparent;padding:2px;line-height:0;display:flex}
  .daybrief li:hover .db-go{opacity:1}
  .daybrief li .db-go:hover{color:var(--ink)}
  .daybrief li.has-go{padding-right:46px}
  .daybrief li:hover .db-check{opacity:1}
  .daybrief li.done{color:#a09b91}
  .daybrief li.done .db-text{text-decoration:line-through;text-decoration-thickness:.75px}
  .daybrief li.done .db-time{color:#bcb5a6}
  .daybrief li.done .db-check{opacity:1;color:#4f7d57}
  .daybrief li .db-time{flex:0 0 auto;font-family:var(--mono);font-size:10px;color:var(--bronze);letter-spacing:.06em}
  .daybrief li .db-text{flex:1;min-width:0}
  .daybrief .db-kicker-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .daybrief .db-kicker-row .db-kicker{margin-bottom:0}
  .daybrief .db-nav{flex:0 0 auto;border:none;background:transparent;color:#b3ab9c;font-size:15px;line-height:1;cursor:pointer;padding:2px 5px;border-radius:6px;font-family:var(--sans);transition:color .15s,background .15s}
  .daybrief .db-nav:hover{color:var(--ink);background:rgba(0,0,0,.05)}
  .daybrief .db-main{width:100%}
  .daybrief .db-clear{font-family:var(--serif-soul);font-style:italic;font-size:13px;color:#b3ab9c}
  .daybrief .db-ahead{width:100%;margin-top:20px;padding-top:16px;border-top:1px solid #e4ded1}
  .daybrief .db-ahead-h{font-family:var(--mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#b3ab9c;margin-bottom:11px}
  .daybrief .db-ahead-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px;width:100%}
  .daybrief .db-ahead-list li{position:relative;display:flex;gap:13px;align-items:baseline;width:100%;font-family:var(--sans);font-size:13px;color:var(--ink);line-height:1.35;cursor:default;padding-right:0}

  /* ===== Studio Line — keeper chat ===== */
  .chat-fab{position:fixed;left:24px;bottom:24px;width:45px;height:45px;border-radius:50%;border:none;cursor:pointer;z-index:60;
    background:linear-gradient(165deg,var(--accent),var(--accent-deep));
    box-shadow:0 8px 22px rgba(120,52,40,.34),inset 0 1px 0 rgba(255,255,255,.18);
    display:flex;align-items:center;justify-content:center;color:#fff;transition:transform .18s ease,box-shadow .18s ease}
  .chat-fab:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(70,50,30,.46)}
  .chat-fab svg{width:19px;height:19px;display:block}
  .chat-fab .chat-badge{position:absolute;top:9px;right:9px;width:9px;height:9px;padding:0;min-width:0;border-radius:50%;
    background:#2f6bff;color:transparent;font-size:0;
    opacity:0;transform:scale(.4);transition:opacity .2s,transform .2s}
  body.chat-unread .chat-fab .chat-badge{opacity:1;transform:scale(1);animation:chatPulse 1.8s ease-out infinite}
  @keyframes chatPulse{0%{box-shadow:0 0 0 0 rgba(47,107,255,.5)}70%{box-shadow:0 0 0 8px rgba(47,107,255,0)}100%{box-shadow:0 0 0 0 rgba(47,107,255,0)}}
  body.chat-open .chat-fab{transform:scale(.92);opacity:.85}

  .chat-panel{position:fixed;left:24px;bottom:24px;width:360px;height:min(540px,calc(100vh - 48px));z-index:61;
    background:var(--paper);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;
    box-shadow:0 24px 64px rgba(40,28,16,.34);
    transform:translateY(16px) scale(.96);opacity:0;pointer-events:none;transform-origin:left bottom;
    transition:transform .26s cubic-bezier(.2,.8,.25,1),opacity .2s ease}
  body.chat-open .chat-panel{transform:translateY(0) scale(1);opacity:1;pointer-events:auto}

  .chat-head{flex:0 0 auto;display:flex;align-items:center;gap:11px;padding:15px 16px 13px;
    background:linear-gradient(180deg,var(--paper-2),var(--paper));border-bottom:1px solid rgba(43,38,34,.09)}
  .chat-head .ch-av{width:34px;height:34px;border-radius:50%;flex:0 0 auto;background:#cdbfa8 var(--av-other) center/cover no-repeat}
  .chat-head .ch-meta{flex:1 1 auto;min-width:0}
  .chat-head .ch-name{font-family:"Louize",Georgia,serif;font-weight:400;font-size:21px;color:var(--ink);line-height:1.1}
  .chat-head .ch-status{display:flex;align-items:center;gap:6px;font-family:var(--sans);font-size:11px;letter-spacing:.01em;color:#9a8f7f;margin-top:1px}
  .chat-head .ch-dot{width:7px;height:7px;border-radius:50%;background:#c3b9a8;transition:background .25s,box-shadow .25s}
  .chat-head.online .ch-dot{background:#5b9e6a;box-shadow:0 0 0 3px rgba(91,158,106,.2)}
  .chat-head .ch-close{flex:0 0 auto;border:none;background:transparent;color:#b3ab9c;font-size:20px;line-height:1;cursor:pointer;padding:4px 6px;border-radius:8px;transition:color .15s,background .15s}
  .chat-head .ch-close:hover{color:var(--ink);background:rgba(0,0,0,.05)}

  .chat-thread{flex:1 1 auto;overflow-y:auto;padding:16px 16px 6px;display:flex;flex-direction:column;gap:8px;
    background:radial-gradient(circle at 18% 12%,rgba(140,106,71,.05),transparent 60%),radial-gradient(circle at 84% 78%,rgba(156,74,58,.045),transparent 55%),var(--paper)}
  .chat-thread::-webkit-scrollbar{width:7px}
  .chat-thread::-webkit-scrollbar-thumb{background:rgba(43,38,34,.16);border-radius:99px}

  .chat-day{align-self:center;display:flex;align-items:center;gap:10px;margin:8px 0 4px;color:#a89e8d;font-family:var(--sans);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase}
  .chat-day::before,.chat-day::after{content:"";display:block;width:34px;height:1px;background:rgba(43,38,34,.14)}

  .msg{max-width:86%;display:flex;align-items:flex-end;gap:7px;animation:msgIn .22s ease}
  .msg-av{width:24px;height:24px;border-radius:50%;flex:0 0 auto;background:#cdbfa8 center/cover no-repeat;box-shadow:0 1px 3px rgba(40,28,16,.18)}
  .msg.them .msg-av{background-image:var(--av-other)}
  .msg.me .msg-av{background-image:var(--av-me)}
  .msg-col{display:flex;flex-direction:column;gap:3px;min-width:0}
  .msg.them{align-self:flex-start}
  .msg.them .msg-col{align-items:flex-start}
  .msg.me{align-self:flex-end;flex-direction:row-reverse}
  .msg.me .msg-col{align-items:flex-end}
  .msg .bub{padding:8px 12px;border-radius:15px;font-family:var(--sans);font-size:13.5px;line-height:1.4;word-wrap:break-word;white-space:pre-wrap}
  .msg .stamp{font-family:var(--sans);font-size:10px;letter-spacing:.01em;color:#b3a996;padding:0 4px}
  .msg.them .bub{background:#fff;color:var(--ink);border:1px solid rgba(43,38,34,.07);border-bottom-left-radius:5px;box-shadow:0 2px 7px rgba(40,28,16,.06)}
  .msg.me .bub{background:linear-gradient(165deg,var(--accent),var(--accent-deep));color:#f6f1e6;border-bottom-right-radius:5px;box-shadow:0 3px 9px rgba(111,82,53,.28)}
  .msg.me .stamp{color:#bcae99}
  .msg .seen{font-family:var(--sans);font-size:10px;color:var(--accent);letter-spacing:.01em;padding:0 4px;display:none}
  .msg.me.is-seen .seen{display:block}
  @keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .chat-typing{display:none;align-items:center;gap:7px;padding:2px 16px 6px;font-family:var(--sans);font-size:11.5px;color:#9a8f7f}
  body.chat-typing-on .chat-typing{display:flex}
  .chat-typing .tdots{display:inline-flex;gap:3px}
  .chat-typing .tdots i{width:5px;height:5px;border-radius:50%;background:var(--accent);opacity:.5;animation:tbounce 1.1s infinite}
  .chat-typing .tdots i:nth-child(2){animation-delay:.18s}
  .chat-typing .tdots i:nth-child(3){animation-delay:.36s}
  @keyframes tbounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-4px);opacity:.9}}

  .chat-err{display:none;font-family:var(--sans);font-size:11.5px;color:var(--seal);background:rgba(156,74,58,.08);padding:7px 14px;border-top:1px solid rgba(156,74,58,.16)}
  .chat-err.show{display:block}
  .chat-compose{position:relative;flex:0 0 auto;display:flex;align-items:flex-end;gap:8px;padding:11px 12px 13px;border-top:1px solid rgba(43,38,34,.09);background:var(--paper-2)}
  .chat-inputwrap{position:relative;flex:1 1 auto;display:flex}
  .chat-compose textarea{flex:1 1 auto;box-sizing:border-box;resize:none;border:none;border-radius:13px;background:#faf7f0;color:var(--ink);font-family:var(--sans);font-size:13.5px;line-height:1.35;min-height:42px;height:42px;padding:11px 64px 6px 12px;max-height:100px;outline:none}
  .chat-compose textarea:focus{outline:none;box-shadow:none}
  .chat-compose textarea::placeholder{color:#b3a996;font-style:normal}
  .chat-send,.chat-emoji{position:absolute;bottom:13px;width:16px;height:16px;padding:0;border:none;background:transparent;cursor:pointer;color:#9b9488;display:flex;align-items:center;justify-content:center;transition:transform .15s,opacity .15s,color .15s}
  .chat-send{right:12px}
  .chat-emoji{right:36px}
  .chat-send:hover,.chat-emoji:hover{transform:scale(1.1);color:var(--bronze-deep)}
  .chat-send:disabled{opacity:.35;cursor:default;transform:none}
  .chat-send svg,.chat-emoji svg{width:16px;height:16px;display:block}
  .chat-emoji-pop{position:absolute;bottom:56px;right:12px;width:236px;max-height:184px;overflow-y:auto;background:#fff;border:1px solid rgba(43,38,34,.1);border-radius:12px;box-shadow:0 12px 30px rgba(40,28,16,.22);padding:8px;display:none;grid-template-columns:repeat(7,1fr);gap:2px;z-index:62}
  .chat-emoji-pop.show{display:grid}
  .chat-emoji-pop button{border:none;background:transparent;cursor:pointer;font-size:18px;line-height:1;padding:5px 0;border-radius:7px;transition:background .12s}
  .chat-emoji-pop button:hover{background:rgba(140,106,71,.12)}
  .daybrief .db-ahead-list .db-text{flex:1;min-width:0}
  .daybrief .db-x{position:absolute;top:10px;right:12px;width:28px;height:28px;border:none;background:transparent;color:var(--slate);
    font-size:20px;line-height:1;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center}
  .daybrief .db-x:hover{background:var(--paper-2);color:var(--ink)}
  .wrap{margin:0;padding:0 40px 150px;min-height:100vh;display:grid;grid-template-columns:30% 1fr;gap:44px;align-items:start}
  .col-left{position:sticky;top:0;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:0}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .mast{animation:rise .45s ease both .04s}
  body:not(.booted) .dash .stat:nth-child(1){animation:rise .45s ease both .12s}
  body:not(.booted) .dash .stat:nth-child(2){animation:rise .45s ease both .17s}
  body:not(.booted) .dash .stat:nth-child(3){animation:rise .45s ease both .22s}
  body:not(.booted) .dash .stat:nth-child(4){animation:rise .45s ease both .27s}
  .progress-card{animation:rise .45s ease both .34s}
  .tabsbar{animation:rise .45s ease both .4s}
  .toolbar{animation:rise .45s ease both .08s}
  .ledger-head{animation:rise .45s ease both .16s}
  .pager{animation:rise .45s ease both .55s}
  .col-right{min-width:0;padding-top:40px;height:100vh;display:flex;flex-direction:column;overflow:hidden;padding-bottom:40px}
  @media(max-width:820px){
    .wrap{grid-template-columns:1fr;gap:24px}
    .col-left{position:static;height:auto}
    .col-right{padding-top:0;height:auto;overflow:visible;padding-bottom:24px}
    .col-right .ledger{flex:none}
  }

  /* ---------- Sync badge ---------- */
  .sync{position:fixed;top:14px;right:18px;font-family:var(--sans);font-size:10px;
        letter-spacing:.14em;text-transform:uppercase;color:var(--slate);display:none;align-items:center;gap:7px;z-index:40;
        background:rgba(255,255,255,.4);padding:6px 11px;border:1px solid var(--rule)}
  .sync .led{width:7px;height:7px;border-radius:50%;background:var(--rule)}
  .sync.on .led{background:#6f8a5a} .sync.local .led{background:var(--bronze)}

  /* ---------- Masthead ---------- */
  header.mast{text-align:center;padding:0 0 6px;margin:0}
  .crest-wrap{position:relative;display:inline-block}
  .crest-img{display:block;width:296px;max-width:100%;height:auto}
  .stamp{position:fixed;top:max(-89.6px,calc(-9.08vw + 47.2px));left:max(-89.6px,calc(-9.08vw + 47.2px));height:min(337.5px,calc(34.2vw - 177.8px));width:auto;z-index:-1;pointer-events:none;transform:rotate(-20deg)}
  .crest{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:13px;letter-spacing:.5em;
          color:var(--bronze);text-transform:uppercase;margin:0 0 14px;padding-left:.5em}
  .wordmark{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:54px;letter-spacing:.18em;
            margin:0;line-height:1;padding-left:.18em}
  .tagline{font-family:var(--serif-soul);font-style:italic;color:var(--slate);font-size:18px;margin:10px 0 0;letter-spacing:.02em}

  /* ---------- Dashboard strip ---------- */
  .dash{display:grid;grid-template-columns:136px 136px;justify-content:center;gap:16px 8px;margin:40px 0 0;background:transparent;width:100%;padding:0;box-sizing:border-box}
  .stat{display:flex;flex-direction:column;align-items:center;text-align:center;width:auto;min-width:0;
        padding:14px 6px 22px;border:none;position:relative}
  .stat::after{content:"";position:absolute;left:50%;transform:translateX(-50%);bottom:0;width:86%;height:1px;background:rgba(216,207,185,.85)}
  .stat .num{font-family:"Louize",Georgia,serif;font-size:32px;font-weight:400;color:#3f2d1c;line-height:1;transition:color .6s ease}
  .stat .num.changed{color:#000}
  .stat .lbl{font-variant-caps:all-small-caps;text-transform:none;font-size:10pt;font-weight:600;letter-spacing:.12em;color:#9e8f7c;margin-top:5px;white-space:nowrap;line-height:1.2;max-width:none}
  @media(max-width:820px){
    /* dash keeps its fixed-width centered grid + dividers at every screen width */
  }
  /* Floating progress card (sticky, above the footer) */
  .progress-card{display:none;/* hidden for now — True Collectors/Prospects moved into the dash */position:fixed;left:calc(4.5vw - 24px);bottom:120px;z-index:31;
        width:calc(21vw - 28px);background:rgba(252,250,245,.38);-webkit-backdrop-filter:blur(14px) saturate(1.1);backdrop-filter:blur(14px) saturate(1.1);border:1px solid var(--rule);
        box-shadow:0 12px 32px rgba(40,37,35,.16);padding:16px 18px 18px;transition:width .28s ease;border-radius:12px}
  .progress-card .pc-row{display:flex;justify-content:space-between;align-items:baseline;gap:16px}
  .progress-card .lbl,.progress-card .count{font-variant-caps:all-small-caps;text-transform:none;font-size:10pt;font-weight:600;letter-spacing:.1em;color:var(--slate);white-space:nowrap}
  .progress-card .lbl{overflow:hidden;text-overflow:ellipsis;min-width:0}
  .progress-card .count{white-space:nowrap;letter-spacing:.06em}
  .progress-card .bar{height:10px;background:rgba(40,37,35,.06);border:1px solid var(--rule);border-radius:999px;margin:4px 0 0;overflow:hidden}
  .progress-card.started .bar{border-color:var(--rule)}
  .progress-card .bar{position:relative}

function daysSince(str){ const t=Date.parse(str); return isNaN(t)?null:Math.floor((Date.now()-t)/86400000); }

function isDue(d){

function computePageSize(host){

let _rsz; window.addEventListener("resize",()=>{ clearTimeout(_rsz); _rsz=setTimeout(()=>renderLedger(),150); });
function renderLedger(){
  let rows = data.slice();

    rows = rows.filter(d=>[d.name,d.email,d.pieces,d.location,d.notes,d.acc].some(v=>(v||"").toLowerCase().includes(q))); }
  if(sortKey){
    const get={
      name: d=>(d.name||"").toLowerCase(),
      pieces: d=>(firstPiece(d.pieces)||"").toLowerCase(),
      loc: d=>{ const p=(d.location||"").split(",").map(t=>t.trim()); return ((p[p.length-1]||"")+" "+(p[0]||"")).toLowerCase(); },
      purchased: d=>Date.parse(d.last_buy)||0,
      ltv: d=>num(d.ltv),
    }[sortKey];
    rows.sort((a,b)=>{ const A=get(a),B=get(b); const e=!A&&A!==0, f=!B&&B!==0;
      if(e&&!f) return 1; if(f&&!e) return -1;
      return (A<B?-1:A>B?1:0)*sortDir; });

    rows.sort((a,b)=>(b.first_look?1:0)-(a.first_look?1:0) || (a.acc||"").localeCompare(b.acc||""));

    </div>`;
  }).join("");

    window._introPlayed=true;

        {duration:300,easing:"ease",delay:250+k*42,fill:"backwards"}));
  }
  if(!window._ledgerBooted && typeof Element!=="undefined" && Element.prototype.animate){
    window._ledgerBooted=true;
    const rows=[...host.querySelectorAll(".entry")];
    const DUR=180, run=Math.max(0,500-DUR), step=rows.length>1?run/(rows.length-1):0;
    rows.forEach((el,k)=> el.animate(
      [{opacity:0,transform:"translateY(22px)"},{opacity:1,transform:"translateY(0)"}],
      {duration:DUR, delay:k*step, easing:"cubic-bezier(.2,.8,.2,1)", fill:"backwards"}));
  } else { window._ledgerBooted=true; }
  host.querySelectorAll(".entry").forEach(el=>el.onclick=()=>showForm(+el.dataset.i));
  host.querySelectorAll(".fav").forEach(b=>b.onclick=e=>{ e.stopPropagation(); toggleFav(+b.dataset.i); });
  host.querySelectorAll(".fu:not(.none)").forEach(b=>b.onclick=e=>{ e.stopPropagation(); openDraft(+b.dataset.i); });
  renderPager(pages);
}
function flipLedger(render){
  const host=document.getElementById("ledger");
  if(!host){ render(); return; }
  const first={};
  host.querySelectorAll(".entry").forEach(el=>{ first[el.dataset.i]=el.getBoundingClientRect().top; });
  render();
  if(typeof Element==="undefined" || !Element.prototype.animate){ return; }
  const MOVE_DUR=240, incoming=[]; let hasMoved=false;
  host.querySelectorAll(".entry").forEach(el=>{
    const ft=first[el.dataset.i], lt=el.getBoundingClientRect().top;
    if(ft!=null){ const dy=ft-lt;
      if(Math.abs(dy)>0.5){ hasMoved=true; el.animate([{transform:`translateY(${dy}px)`},{transform:"translateY(0)"}],{duration:MOVE_DUR,easing:"cubic-bezier(.2,.8,.2,1)"}); }
    } else { incoming.push(el); }
  });
  if(!incoming.length) return;
  // Stagger new rows up from below, overlapping the reposition slightly so the
  // whole page settles within ~0.5s.
  incoming.forEach(el=>{ el.style.visibility="hidden"; });
  const base=hasMoved?120:0, DUR=180, RUN=500-base-DUR;
  const step=incoming.length>1 ? Math.max(20,RUN/(incoming.length-1)) : 0;
  incoming.forEach((el,k)=>{
    setTimeout(()=>{
      el.style.visibility="";
      el.animate([{opacity:0,transform:"translateY(22px)"},{opacity:1,transform:"translateY(0)"}],{duration:DUR,easing:"cubic-bezier(.2,.8,.2,1)"});
    }, base + k*step);
  });
}
function renderPager(pages){
  const el=document.getElementById("pager"); if(!el) return;
  if(pages<=1){ el.innerHTML=""; return; }
  let h=`<button ${page===1?'disabled':''} data-p="prev">‹</button>`;
  for(let p=1;p<=pages;p++) h+=`<button class="${p===page?'on':''}" data-p="${p}">${p}</button>`;
  h+=`<button ${page===pages?'disabled':''} data-p="next">›</button>`;
  el.innerHTML=h;
  el.querySelectorAll("button[data-p]").forEach(b=>b.onclick=()=>{
    const v=b.dataset.p;
    if(v==="prev"&&page>1)page--; else if(v==="next"&&page<pages)page++; else if(/^\d+$/.test(v))page=+v;
    flipLedger(renderLedger); window.scrollTo({top:0,behavior:"smooth"});
  });
}

function editionGet(tmpl, ed){
  const base=LETTER_EDITIONS[tmpl] && LETTER_EDITIONS[tmpl][ed]; if(!base) return null;
  try{ const o=JSON.parse(localStorage.getItem("macon_ed_"+tmpl+"_"+ed)||"null"); if(o) return {...base, ...o}; }catch(e){}
  return base;
}
function editionSave(tmpl, ed, subject, body){
  const base=LETTER_EDITIONS[tmpl] && LETTER_EDITIONS[tmpl][ed]; if(!base) return;
  if(subject===base.subject && body===base.body) localStorage.removeItem("macon_ed_"+tmpl+"_"+ed);
  else localStorage.setItem("macon_ed_"+tmpl+"_"+ed, JSON.stringify({subject, body}));
}
function openCompose(){
  const host=document.getElementById("cardHost");
  let seg="all", tmpl="makers";
  const thisMonth=new Date().toLocaleDateString("en-CA").slice(0,7);
  const defEd=t=> LETTER_EDITIONS[t] ? (LETTER_EDITIONS[t][thisMonth]?thisMonth:Object.keys(LETTER_EDITIONS[t])[0]) : "";
  let ed=defEd(tmpl);
  let subj, body;
  const loadTmpl=()=>{ const e=ed&&editionGet(tmpl,ed); subj=e?e.subject:BROADCASTS[tmpl].subject; body=e?e.body:BROADCASTS[tmpl].body; };
  loadTmpl();
  const recipients=()=>{ const seen=new Set(), out=[];
    data.filter(SEGMENTS[seg].fn).forEach(d=>{ const e=(d.email||"").trim();
      if(e && !seen.has(e.toLowerCase())){ seen.add(e.toLowerCase()); out.push(e); } });
    return out; };
  function render(){
    const recs=recipients();
    host.innerHTML=`
      <div class="card-body" style="padding-bottom:0">
        <div style="font-family:var(--mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--bronze);margin-bottom:8px">Broadcast</div>
        <h2>Compose</h2>
      </div>
      <div class="form-grid">
        <div class="fg"><label>Audience</label><select id="c_seg">${Object.entries(SEGMENTS).map(([k,v])=>`<option value="${k}" ${k===seg?'selected':''}>${esc(v.label)}</option>`).join("")}</select></div>
        <div class="fg"><label>Template</label><select id="c_tmpl">${Object.entries(BROADCASTS).map(([k,v])=>`<option value="${k}" ${k===tmpl?'selected':''}>${esc(v.label)}</option>`).join("")}</select></div>
        ${LETTER_EDITIONS[tmpl]?`<div class="fg full"><label>Edition</label><select id="c_ed">${Object.entries(LETTER_EDITIONS[tmpl]).map(([k,v])=>`<option value="${k}" ${k===ed?'selected':''}>${esc(v.label)}</option>`).join("")}</select></div>`:""}
        <div class="fg full"><label>Subject</label><div class="dfield"><input id="c_subj" value="${esc(subj)}" style="width:100%;padding-right:36px"><button class="dcopy" id="c_copysubj" title="Copy subject">${COPY_SVG}</button></div></div>
        <div class="fg full"><label>Message</label><div class="dfield"><textarea id="c_body" rows="9" style="width:100%;line-height:1.5;padding-right:36px;resize:vertical">${esc(body)}</textarea><button class="dcopy" id="c_copybody" title="Copy message">${COPY_SVG}</button></div></div>
        <div class="fg full"><label>Recipients · ${recs.length}</label>
          <div class="dfield"><textarea id="c_bcc" rows="2" readonly style="width:100%;padding-right:36px;resize:none;color:var(--slate);font-size:12px">${esc(recs.join(", "))}</textarea><button class="dcopy" id="c_copybcc" title="Copy BCC list">${COPY_SVG}</button></div>
          <div style="font-size:11px;color:var(--slate);margin-top:6px">Send the email to yourself and paste these into the BCC field, so addresses stay private.</div>
        </div>
      </div>
      <div class="card-actions">
        <span></span>
        <div><button class="btn ghost" id="c_close">Close</button>
        <button class="btn" id="c_mail">Open in Mail</button></div>
      </div>`;
    const grab=()=>{ subj=host.querySelector("#c_subj").value; body=host.querySelector("#c_body").value; if(ed) editionSave(tmpl, ed, subj, body); };
    host.querySelector("#c_subj").oninput=grab;
    host.querySelector("#c_body").oninput=grab;
    host.querySelector("#c_seg").onchange=e=>{ grab(); seg=e.target.value; render(); };
    host.querySelector("#c_tmpl").onchange=e=>{ grab(); tmpl=e.target.value; ed=defEd(tmpl); loadTmpl(); render(); };
    const edSel=host.querySelector("#c_ed");
    if(edSel) edSel.onchange=e=>{ grab(); ed=e.target.value; loadTmpl(); render(); };
    const flash=btn=>{ const o=btn.innerHTML; btn.innerHTML="✓"; setTimeout(()=>btn.innerHTML=o,1200); };
    const copy=async(text,btn)=>{ try{ await navigator.clipboard.writeText(text); flash(btn); }catch(e){ alert("Copy failed — select the text manually."); } };
    host.querySelector("#c_copysubj").onclick=e=>copy(host.querySelector("#c_subj").value, e.currentTarget);
    host.querySelector("#c_copybody").onclick=e=>copy(host.querySelector("#c_body").value, e.currentTarget);
    host.querySelector("#c_copybcc").onclick=e=>copy(recipients().join(", "), e.currentTarget);
    host.querySelector("#c_close").onclick=closeScrim;
    host.querySelector("#c_mail").onclick=()=>{ const url=`mailto:?bcc=${encodeURIComponent(recipients().join(","))}&subject=${encodeURIComponent(host.querySelector("#c_subj").value)}&body=${encodeURIComponent(host.querySelector("#c_body").value)}`; window.location.href=url; };
  }
  render();
  openScrim();
}
function opt(arr,sel){ return arr.map(v=>`<option ${v===sel?'selected':''}>${v}</option>`).join(""); }
function pieceItem(val, idx){
  const inner = (val && !PRODUCTS.includes(val))
    ? `<input class="pcustom" placeholder="Custom piece name" value="${esc(val)}">`
    : `<select class="psel"><option value="">Piece</option>${PRODUCTS.map(p=>`<option ${p===val?'selected':''}>${esc(p)}</option>`).join("")}<option value="__custom__">Custom…</option></select>`;
  return `<span class="prow">${inner}<button type="button" class="pdel" data-idx="${idx}" title="Remove piece">&times;</button></span>`;

const ORDER_TODO_CUTOFF="2026-06-10"; // orders entered after this date also surface as to-dos
// Persistent completion: letters and follow-ups stay on the list, day after day,
// until someone checks them off. Done ids: {"letter|2026-07-06":"2026-07-08", ...}
let todoDone=null; // synced completion map {id: done date}
function briefDone(){
  if(todoDone) return todoDone;
  try{ todoDone=JSON.parse(localStorage.getItem("macon_brief_done_v2")||"{}"); }catch(e){ todoDone={}; }
  return todoDone;
}
function saveBriefLocal(){
  const m=briefDone();
  const cutoff=new Date(Date.now()-7*86400000).toLocaleDateString("en-CA");
  Object.keys(m).forEach(k=>{ if(k.startsWith("cal|") && (m[k]||"")<cutoff) delete m[k]; });
  localStorage.setItem("macon_brief_done_v2", JSON.stringify(m));
}
async function markTodo(id, isDone){
  const m=briefDone(); const today=new Date().toLocaleDateString("en-CA");
  if(isDone) m[id]=today; else delete m[id];
  saveBriefLocal();
  if(synced&&sb){ try{
    if(isDone) await sb.from("bureau_todos").upsert({id, done_at:today},{onConflict:"id"});
    else await sb.from("bureau_todos").delete().eq("id",id);
  }catch(e){} }
}
async function loadTodoDone(){
  if(!(synced&&sb)) return;
  try{
    const {data:rows, error}=await sb.from("bureau_todos").select("id,done_at");
    if(error) return;
    const m={}; (rows||[]).forEach(r=>m[r.id]=r.done_at);
    todoDone=m; saveBriefLocal(); applyDoneToBrief();
  }catch(e){}
}
function applyDoneToBrief(){
  const m=briefDone();
  document.querySelectorAll(".daybrief li[data-id]").forEach(li=>li.classList.toggle("done", !!m[li.dataset.id]));
}
function dayDate(offset){ const dt=new Date(); dt.setHours(12,0,0,0); dt.setDate(dt.getDate()+offset); return dt; }
function dayKey(offset){ return dayDate(offset).toLocaleDateString("en-CA"); }
function dayLabel(offset){
  if(offset===0) return "Today"; if(offset===1) return "Tomorrow"; if(offset===-1) return "Yesterday";
  return dayDate(offset).toLocaleDateString("en-US",{weekday:"long"});
}
// First day a collector's follow-up would come due (ignores snooze) — used to project ahead.
function followDueDate(d){
  const lb=Date.parse(d.last_buy);
  if(isNaN(lb) || d.story==="Yes") return null;
  return lb + (leadTime(firstPiece(d.pieces))+14)*86400000;
}
// Items for a given day offset (0 = today). Today accumulates overdue letters +
// currently-due follow-ups; other days show what is scheduled / projected to land then.
function itemsForOffset(offset, events){
  const done=briefDone();
  const dayStr=dayKey(offset), today=dayKey(0);
  const out=[];
  if(events) events.forEach(e=>{
    const ed=e.date||today;                       // older cached payloads had no date → treat as today
    if(ed===dayStr) out.push({id:"cal|"+ed+"|"+e.title, time:e.allDay?"ALL DAY":e.start, title:e.title, act:null});
  });
  BUREAU_LETTERS.forEach(t=>{
    const id="letter|"+t.date; if(done[id]) return;
    if(offset===0){
      if(t.date<=today) out.push({id, time:t.date<today?new Date(Date.parse(t.date)+43200000).toLocaleDateString("en-US",{month:"short",day:"numeric"}).toUpperCase():"", title:t.title, act:{type:"compose"}});
    } else if(t.date===dayStr){
      out.push({id, time:"", title:t.title, act:{type:"compose"}});
    }
  });
  data.forEach((d,i)=>{
    const id="fu|"+(d.acc||i)+"|"+(d.last_buy||""); if(done[id]) return;
    const lb=Date.parse(d.last_buy);
    if(isNaN(lb) || lb<Date.parse(ORDER_TODO_CUTOFF)) return;
    let show;
    if(offset===0) show=isDue(d);
    else { const due=followDueDate(d); show = due!=null && new Date(due).toLocaleDateString("en-CA")===dayStr; }
    if(show) out.push({id, time:"", title:`Follow up with ${d.name||d.acc}`, act:{type:"draft", i}});
  });
  return out;
}

/* ---------- Import collectors from an orders CSV ---------- */
function parseCSV(text){
  text=text.replace(/^﻿/,""); const rows=[]; let row=[],field="",q=false,i=0;
  while(i<text.length){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){field+='"';i+=2;continue;} q=false;i++;continue;} field+=c;i++;continue; }
    if(c==='"'){q=true;i++;continue;}
    if(c===','){row.push(field);field="";i++;continue;}
    if(c==='\r'){i++;continue;}
    if(c==='\n'){row.push(field);rows.push(row);row=[];field="";i++;continue;}
    field+=c;i++;
  }
  if(field.length||row.length){row.push(field);rows.push(row);}
  return rows;
}
async function importOrdersCSV(text){
  const rows=parseCSV(text).filter(r=>r.length>1);
  if(rows.length<2){ alert("That CSV looks empty."); return; }
  const head=rows[0].map(h=>h.trim());
  const ix=n=>head.indexOf(n);
  const cE=ix("Contact email"), cItem=ix("Item"), cTot=ix("Total"), cNet=ix("Net amount"),
        cDate=ix("Date created"), cBill=ix("Billing name"), cRec=ix("Recipient name"),
        cCity=ix("Delivery city"), cCtry=ix("Delivery country"),
        cBph=ix("Billing phone"), cRph=ix("Recipient phone");
  // Order id column (Wix: "Order number"; Big Cartel: "Number"). Used to count an
  // order's Total once even when the export has one row per item.
  const cOrd=[ix("Order number"),ix("Order #"),ix("Number"),ix("Order")].find(i=>i>=0);
  // Signed parse: refunds/negative rows must subtract, not add (num() strips the minus).
  const amt=v=>{ const n=parseFloat(String(v??"").replace(/[^0-9.\-]/g,"")); return isNaN(n)?0:n; };
  if(cE<0){ alert("No 'Contact email' column found — is this a Big Cartel orders export?"); return; }
  const groups=new Map();
  for(let r=1;r<rows.length;r++){ const row=rows[r];
    const email=(row[cE]||"").trim().toLowerCase(); if(!email) continue;
    let g=groups.get(email);
    if(!g){ g={email,name:"",items:[],total:0,dates:[],city:"",ctry:"",phone:"",orders:new Set()}; groups.set(email,g); }
    const nm=((cBill>=0&&row[cBill])||(cRec>=0&&row[cRec])||"").trim(); if(nm&&!g.name)g.name=nm;
    const it=(cItem>=0?row[cItem]:"").trim(); if(it)g.items.push(it);
    const oid = cOrd!=null ? (row[cOrd]||"").trim() : "";
    if(!oid || !g.orders.has(oid)){
      g.total += amt(cTot>=0?row[cTot]:(cNet>=0?row[cNet]:0));
      if(oid) g.orders.add(oid);
    }
    const dt=(cDate>=0?row[cDate]:"").trim(); if(dt)g.dates.push(dt);
    if(!g.city){ g.city=(cCity>=0?row[cCity]:"").trim(); g.ctry=(cCtry>=0?row[cCtry]:"").trim(); }
    if(!g.phone){ g.phone=((cBph>=0&&row[cBph])||(cRph>=0&&row[cRph])||"").replace(/[^0-9+]/g,""); }
  }
  const list=[...groups.values()];
  if(!list.length){ alert("No collectors found in that CSV."); return; }
  if(!confirm(`Import ${list.length} collectors from this CSV? Existing collectors with the same email will be updated.`)) return;
  let maxAcc=0; data.forEach(d=>{ const m=/M-(\d+)/.exec(d.acc||""); if(m)maxAcc=Math.max(maxAcc,+m[1]); });
  const payloads=list.map(g=>{
    const existing=data.find(d=>(d.email||"").toLowerCase()===g.email);
    const tally={}; g.items.forEach(it=>tally[it]=(tally[it]||0)+1);
    const pieces=Object.entries(tally).map(([k,v])=>v>1?`${k} ×${v}`:k).join(", ");
    const ds=g.dates.map(s=>({s,t:Date.parse(s)})).filter(x=>!isNaN(x.t)).sort((a,b)=>a.t-b.t);
    const loc=[g.city,g.ctry].filter(Boolean).join(", ");
    const acc=existing?existing.acc:("M-"+String(++maxAcc).padStart(3,"0"));
    const rec=Object.assign({}, existing||{}, {acc, email:g.email, name:g.name||(existing&&existing.name)||"",
      ltv:Math.round(g.total), pieces, location:loc, phone:g.phone,
      first_look:(existing&&existing.first_look)||Math.round(g.total)>1000,
      first_buy:ds.length?ds[0].s:(existing&&existing.first_buy)||"",
      last_buy:ds.length?ds[ds.length-1].s:(existing&&existing.last_buy)||""});
    const p={}; COLS.forEach(c=>p[c]=rec[c]!=null?rec[c]:null);
    return p;
  });
  if(synced){
    const {error}=await sb.from("collectors").upsert(payloads,{onConflict:"acc"});
    if(error){ alert("Import failed: "+error.message); return; }
    await refresh();
  } else {
    payloads.forEach(p=>{ const i=data.findIndex(d=>d.acc===p.acc); if(i>=0)data[i]=p; else data.push(p); });
    local.save(); renderAll();
  }
  page=1; renderLedger();
  alert(`Imported ${list.length} collectors.`);
}
document.getElementById("exportBtn").onclick=()=>{
  const head=COLS.join(",");
  const body=data.map(d=>COLS.map(c=>{ let v=d[c]; if(typeof v==="boolean") v=v?"Yes":"No"; v=(v==null?"":String(v)); return '"'+v.replace(/"/g,'""')+'"'; }).join(",")).join("\n");
  download("macon_archive.csv", head+"\n"+body, "text/csv");

document.getElementById("exportJson").onclick=()=>download("macon_archive.json", JSON.stringify(data,null,2),"application/json");

  r.onload=async()=>{ try{ const j=JSON.parse(r.result);
    if(!Array.isArray(j)){ alert("That file doesn't look like a Maçon archive."); return; }
    if(!confirm("Import "+j.length+" entries into the archive?")) return;
    if(synced){ for(const rec of j){ const p={}; COLS.forEach(c=>p[c]=rec[c]); await sb.from("collectors").upsert(p,{onConflict:"acc"}); } await refresh(); }
    else { data=j; local.save(); renderAll(); }
  }catch(err){ alert("Could not read that file."); } };
  r.readAsText(f);
};

function download(name,content,type){
  const b=new Blob([content],{type}); const u=URL.createObjectURL(b);
  const a=document.createElement("a"); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u);
}

function renderAll(){ renderDash(); if(tab==="provenance") renderProvenance(); else renderLedger(); renderDrawer(); }

/* ===== Studio Line — keeper-to-keeper chat (isolated scope) ===== */
(function(){
const KEEPERS={ "alex@studiomacon.co":"Alex", "hannah@studiomacon.co":"Hannah" };
const ANIMALS={ "hannah@studiomacon.co":"rebi", "alex@studiomacon.co":"ori" };
const NICKS=["Scrooms","Scombridae","Little Windmill","Western Sweet","Lilac Reverie","Squeeps","Squeepsbot","Scroomsbury","Scombs","Squeepington Jr."];
function currentNick(){ return NICKS[Math.floor(Date.now()/3600000)%NICKS.length]; }
function setPlaceholder(){ const el=document.getElementById("chatInput"); if(el) el.placeholder="Write to "+currentNick()+"…"; }
const EMOJIS=["😀","😄","😊","🙂","😉","😍","🥰","😘","😎","🤩","😇","🤗","😋","😛","🤔","😅","😂","🥹","😭","😮","🙃","😴","🙌","👏","👍","👎","🙏","💪","✨","⭐","🔥","💛","🧡","❤️","🤎","🖤","🐰","🐻","🌙","🫶","🥂","☕"];
function initEmoji(){
  const btn=document.getElementById("chatEmoji"), pop=document.getElementById("chatEmojiPop"), ta=document.getElementById("chatInput");
  if(!btn||!pop||!ta) return;
  if(!pop.childElementCount){
    EMOJIS.forEach(e=>{ const b=document.createElement("button"); b.type="button"; b.textContent=e;
      b.addEventListener("mousedown",ev=>ev.preventDefault());
      b.addEventListener("click",()=>insertEmoji(e)); pop.appendChild(b); });
  }
  btn.addEventListener("mousedown",ev=>ev.preventDefault());
  btn.addEventListener("click",()=>pop.classList.toggle("show"));
  document.addEventListener("click",ev=>{ if(!pop.contains(ev.target) && ev.target!==btn && !btn.contains(ev.target)) pop.classList.remove("show"); });
}
function insertEmoji(e){
  const ta=document.getElementById("chatInput"); if(!ta) return;
  const s=ta.selectionStart??ta.value.length, en=ta.selectionEnd??ta.value.length;
  ta.value=ta.value.slice(0,s)+e+ta.value.slice(en);
  const pos=s+e.length; ta.focus(); ta.selectionStart=ta.selectionEnd=pos;
  ta.dispatchEvent(new Event("input",{bubbles:true}));
}
let chatReady=false, myEmail=null, otherEmail=null, otherName="Studio", chatOpen=false;
let chatMsgsCh=null, chatRoomCh=null, lastDayKey=null, lastMineEl=null, unread=0, typingTO=null, sendTypingAt=0;
let useSynthBell=false, bellAudio=null, audioCtx=null;

function cssEsc(s){ return (window.CSS&&CSS.escape)?CSS.escape(s):String(s).replace(/["\\]/g,"\\$&"); }
function fmtTime(iso){ return new Date(iso).toLocaleTimeString([], {hour:"numeric",minute:"2-digit"}); }
function dayKey(iso){ return new Date(iso).toDateString(); }
function dayLabel(iso){
  const d=new Date(iso), t=new Date(); t.setHours(0,0,0,0);
  const dd=new Date(d); dd.setHours(0,0,0,0);
  const diff=Math.round((t-dd)/86400000);
  if(diff===0) return "Today";
  if(diff===1) return "Yesterday";
  return d.toLocaleDateString([], {weekday:"long",month:"long",day:"numeric"});
}

window.initChat = function initChat(){
  if(chatReady) return;
  if(!document.getElementById("chatFab")) return;
  sb.auth.getSession().then(({data:{session}})=>{
    if(!session) return;
    myEmail=session.user.email;
    otherEmail=Object.keys(KEEPERS).find(e=>e!==myEmail) || null;
    otherName=otherEmail?KEEPERS[otherEmail]:"Studio";
    document.getElementById("chatName").textContent=otherName;
    document.getElementById("chatAv").textContent="";
    const meA=ANIMALS[myEmail]||"ori", otherA=ANIMALS[otherEmail]||"rebi";
    document.body.style.setProperty("--av-me",'url("pieces/'+meA+'.avif")');
    document.body.style.setProperty("--av-other",'url("pieces/'+otherA+'.avif")');
    setPlaceholder(); setInterval(setPlaceholder,60000);
    wireChatUI();
    preloadBell();
    loadHistory();
    subscribeMessages();
    joinRoom();
    chatReady=true;
  });
}

function wireChatUI(){
  const input=document.getElementById("chatInput");
  const send=document.getElementById("chatSend");
  document.getElementById("chatFab").onclick=()=>toggleChat();
  document.getElementById("chatClose").onclick=()=>toggleChat(false);
  input.addEventListener("input",()=>{ send.disabled=!input.value.trim(); autoGrow(input); signalTyping(); showErr(""); });
  input.addEventListener("keydown",e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); sendMessage(); } });
  send.onclick=()=>sendMessage();
  const unlock=()=>{ ensureAudio(); if(audioCtx&&audioCtx.state==="suspended") audioCtx.resume(); window.removeEventListener("pointerdown",unlock); };
  window.addEventListener("pointerdown",unlock);
  initEmoji();
}
function autoGrow(el){ el.style.height="auto"; el.style.height=Math.min(el.scrollHeight,96)+"px"; }

function toggleChat(force){
  chatOpen=(force===undefined)?!chatOpen:force;
  document.body.classList.toggle("chat-open",chatOpen);
  if(chatOpen){ document.getElementById("chatInput").focus(); scrollThread(true); markRead(); }
  updateBadge();
}

async function loadHistory(){
  const {data:rows,error}=await sb.from("messages").select("*").order("created_at",{ascending:true}).limit(300);
  if(error) return;
  const thread=document.getElementById("chatThread");
  thread.innerHTML=""; lastDayKey=null; lastMineEl=null;
  (rows||[]).forEach(r=>renderMsg(r,false));
  refreshSeen(rows||[]);
  unread=(rows||[]).filter(r=>r.sender===otherEmail && !r.read_at).length;
  updateBadge();
  scrollThread(true);
  if(chatOpen) markRead();
}

function renderMsg(r,animate){
  const thread=document.getElementById("chatThread");
  const dk=dayKey(r.created_at);
  if(dk!==lastDayKey){
    const div=document.createElement("div"); div.className="chat-day"; div.textContent=dayLabel(r.created_at);
    thread.appendChild(div); lastDayKey=dk;
  }
  const mine=r.sender===myEmail;
  const wrap=document.createElement("div"); wrap.className="msg "+(mine?"me":"them"); wrap.dataset.id=r.id;
  if(!animate) wrap.style.animation="none";
  const av=document.createElement("div"); av.className="msg-av";
  const col=document.createElement("div"); col.className="msg-col";
  const bub=document.createElement("div"); bub.className="bub"; bub.textContent=r.body;
  const stamp=document.createElement("div"); stamp.className="stamp"; stamp.textContent=fmtTime(r.created_at);
  col.appendChild(bub); col.appendChild(stamp);
  if(mine){ const seen=document.createElement("div"); seen.className="seen"; seen.textContent="Seen"; col.appendChild(seen); lastMineEl=wrap; }
  wrap.appendChild(av); wrap.appendChild(col);
  thread.appendChild(wrap);
}

function refreshSeen(rows){
  document.querySelectorAll(".msg.me.is-seen").forEach(el=>el.classList.remove("is-seen"));
  const mine=rows.filter(r=>r.sender===myEmail);
  if(!mine.length) return;
  const last=mine[mine.length-1];
  if(last.read_at){ const el=document.querySelector('.msg.me[data-id="'+cssEsc(last.id)+'"]'); if(el) el.classList.add("is-seen"); }
}

function handleInsert(r){
  if(document.querySelector('.msg[data-id="'+cssEsc(r.id)+'"]')) return;
  renderMsg(r,true); scrollThread();
  if(r.sender!==myEmail){
    clearTyping();
    if(chatOpen) markRead(); else { unread++; updateBadge(); }
    playBell();
  }
}
function handleUpdate(r){
  if(r.sender===myEmail && r.read_at){
    const el=document.querySelector('.msg.me[data-id="'+cssEsc(r.id)+'"]');
    if(el && el===lastMineEl){
      document.querySelectorAll(".msg.me.is-seen").forEach(x=>x.classList.remove("is-seen"));
      el.classList.add("is-seen");
    }
  }
}

async function sendMessage(){
  const input=document.getElementById("chatInput");
  const body=input.value.trim(); if(!body) return;
  input.value=""; document.getElementById("chatSend").disabled=true; autoGrow(input);
  const {data,error}=await sb.from("messages").insert({sender:myEmail,body}).select().single();
  if(error){
    input.value=body; document.getElementById("chatSend").disabled=false; autoGrow(input);
    showErr(/schema cache|does not exist|PGRST205/i.test(error.message||"")
      ? "Chat isn't set up yet — the messages table isn't reachable."
      : "Couldn't send — check your connection and try again.");
    return;
  }
  showErr(""); if(data){ renderMsg(data,true); scrollThread(); }
}
function showErr(msg){
  const el=document.getElementById("chatErr"); if(!el) return;
  el.textContent=msg||""; el.classList.toggle("show",!!msg);
}

async function markRead(){
  if(!otherEmail) return;
  unread=0; updateBadge();
  await sb.from("messages").update({read_at:new Date().toISOString()}).eq("sender",otherEmail).is("read_at",null);
}

function updateBadge(){
  const b=document.getElementById("chatBadge"); if(!b) return;
  b.textContent=unread>9?"9+":String(unread);
  document.body.classList.toggle("chat-unread",unread>0 && !chatOpen);
}

function subscribeMessages(){
  chatMsgsCh=sb.channel("messages-rt")
    .on("postgres_changes",{event:"INSERT",schema:"public",table:"messages"},p=>handleInsert(p.new))
    .on("postgres_changes",{event:"UPDATE",schema:"public",table:"messages"},p=>handleUpdate(p.new))
    .subscribe();
}

function joinRoom(){
  chatRoomCh=sb.channel("studio-line",{config:{presence:{key:myEmail}}});
  chatRoomCh.on("presence",{event:"sync"},()=>{
    const st=chatRoomCh.presenceState();
    const present=Object.values(st).flat().some(p=>p.email===otherEmail);
    setOnline(present);
  });
  chatRoomCh.on("broadcast",{event:"typing"},({payload})=>{ if(payload&&payload.from===otherEmail) showTyping(); });
  chatRoomCh.subscribe(async status=>{ if(status==="SUBSCRIBED") await chatRoomCh.track({email:myEmail,online:true}); });
}
function setOnline(on){
  document.getElementById("chatHead").classList.toggle("online",on);
  document.getElementById("chatStatus").textContent=on?"online":"offline";
}

function signalTyping(){
  if(!chatRoomCh) return;
  const now=Date.now();
  if(now-sendTypingAt>1100){ sendTypingAt=now; chatRoomCh.send({type:"broadcast",event:"typing",payload:{from:myEmail}}); }
}
function showTyping(){
  document.body.classList.add("chat-typing-on");
  document.getElementById("chatTypingTxt").textContent=otherName+" is typing";
  if(chatOpen) scrollThread();
  clearTimeout(typingTO); typingTO=setTimeout(clearTyping,2600);
}
function clearTyping(){ document.body.classList.remove("chat-typing-on"); }

function scrollThread(instant){
  const t=document.getElementById("chatThread"); if(!t) return;
  t.scrollTo({top:t.scrollHeight,behavior:instant?"auto":"smooth"});
}

/* --- sheep-bell notification (synth placeholder; auto-overridden by public/bell.mp3) --- */
function preloadBell(){
  try{
    bellAudio=new Audio("public/bell.mp3"); bellAudio.preload="auto"; bellAudio.volume=.55;
    bellAudio.addEventListener("error",()=>{ useSynthBell=true; });
  }catch(e){ useSynthBell=true; }
}
function ensureAudio(){ if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }
function playBell(){
  if(!useSynthBell && bellAudio){
    try{ bellAudio.currentTime=0; const pr=bellAudio.play(); if(pr&&pr.catch) pr.catch(()=>synthBell()); return; }catch(e){}
  }
  synthBell();
}
function synthBell(){
  ensureAudio(); if(!audioCtx) return; const ctx=audioCtx;
  if(ctx.state==="suspended") ctx.resume();
  const strike=(t0,gain)=>{
    const master=ctx.createGain(); master.connect(ctx.destination);
    master.gain.setValueAtTime(0.0001,t0);
    master.gain.exponentialRampToValueAtTime(gain,t0+0.005);
    master.gain.exponentialRampToValueAtTime(0.0006,t0+0.55);
    [[1,540],[0.7,735],[0.5,1010],[0.35,1280],[0.22,1660]].forEach(([g,f])=>{
      const o=ctx.createOscillator(); o.type="triangle"; o.frequency.value=f;
      const og=ctx.createGain(); og.gain.value=g; o.connect(og); og.connect(master);
      o.start(t0); o.stop(t0+0.6);
    });
    const sq=ctx.createOscillator(); sq.type="square"; sq.frequency.value=270;
    const sg=ctx.createGain(); sg.gain.value=0.12; sq.connect(sg); sg.connect(master);
    sq.start(t0); sq.stop(t0+0.12);
  };
  const t=ctx.currentTime;
  strike(t,0.5); strike(t+0.13,0.32);
}
})();

/* ===== Accent theme picker (temporary toggle) ===== */
(function(){
  const THEMES=[
    {n:"Terracotta", a:"#db6b50", d:"#bd5440"},
    {n:"Ochre",      a:"#ce9538", d:"#a96d22"},
    {n:"Sage",       a:"#80b266", d:"#618a4d"},
    {n:"Teal",       a:"#56b1a4", d:"#41897e"},
    {n:"Slate Blue", a:"#6a92bd", d:"#50719c"},
    {n:"Plum",       a:"#a87496", d:"#83587b"}
  ];
  const root=document.documentElement;
  function setVars(t){ root.style.setProperty("--accent",t.a); root.style.setProperty("--accent-deep",t.d); }
  let cur=THEMES[0];
  try{ const s=JSON.parse(localStorage.getItem("macon_accent")||"null"); if(s&&s.a) cur={a:s.a,d:s.d}; }catch(e){}
  setVars(cur); // apply ASAP
  function init(){
    const btn=document.getElementById("themeBtn"), pop=document.getElementById("themePop");
    if(!btn||!pop) return;
    pop.innerHTML=THEMES.map(t=>`<button data-a="${t.a}" data-d="${t.d}" title="${t.n}" style="background:${t.a}"></button>`).join("");
    const mark=()=>pop.querySelectorAll("button").forEach(b=>b.classList.toggle("active", b.dataset.a===cur.a));
    pop.querySelectorAll("button").forEach(b=>b.onclick=()=>{ cur={a:b.dataset.a,d:b.dataset.d}; setVars(cur); try{localStorage.setItem("macon_accent",JSON.stringify(cur))}catch(e){} mark(); pop.classList.remove("show"); });
    btn.onclick=e=>{ e.stopPropagation(); pop.classList.toggle("show"); mark(); };
    document.addEventListener("click",e=>{ if(!btn.contains(e.target)&&!pop.contains(e.target)) pop.classList.remove("show"); });
    mark();
  }
  if(document.readyState!=="loading") init(); else document.addEventListener("DOMContentLoaded",init);
})();

boot();
