<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maçon · Bureau of Provenance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ---------- Brand fonts ---------- */
  @font-face{font-family:"Louize";src:url("fonts/louize.woff2") format("woff2");font-weight:400;font-style:normal;font-display:swap}
  @font-face{font-family:"Louize";src:url("fonts/louize-italic.woff2") format("woff2");font-weight:400;font-style:italic;font-display:swap}
  @font-face{font-family:"DM Mono";src:url("fonts/dm-mono-300.woff2") format("woff2");font-weight:300;font-style:normal;font-display:swap}

  :root{
    --ink:#282523; --ivory:#f4efe4; --paper:#ECE4D4;
    --tan:#CFA886; --sienna:#9F551B; --verm:#DF3131; --gold:#C7A24E;
    --slate:#8a7f6f; --rule:#ddd2bd; --shadow:rgba(40,37,35,.13);
    --serif:"Louize",Georgia,"Times New Roman",serif;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
    --mono:"DM Mono",ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--ivory); color:var(--ink); font-family:var(--serif);
    font-size:17px; line-height:1.5; -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(circle at 15% 0%,rgba(0,0,0,.015) 0,transparent 55%),
                     radial-gradient(circle at 85% 100%,rgba(0,0,0,.015) 0,transparent 55%);
  }
  .mono{font-family:var(--mono)}
  .wrap{max-width:1120px;margin:0 auto;padding:34px 34px 110px}

  /* ---------- Sync badge ---------- */
  .sync{position:fixed;top:14px;right:18px;font-family:var(--sans);font-size:10px;letter-spacing:.16em;
        text-transform:uppercase;color:var(--slate);display:flex;align-items:center;gap:7px;z-index:40;
        background:rgba(246,240,227,.8);padding:6px 11px;border:1px solid var(--rule);backdrop-filter:blur(4px)}
  .sync .led{width:7px;height:7px;border-radius:50%;background:var(--rule)}
  .sync.on .led{background:#6f9a5f} .sync.local .led{background:var(--tan)}

  /* ---------- Masthead (placeholder for future header image) ---------- */
  header.mast{padding:18px 0 30px}
  .banner-ph{height:150px;border:1px dashed var(--rule);display:flex;align-items:center;justify-content:center;
        font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--tan);
        background:repeating-linear-gradient(45deg,transparent,transparent 11px,rgba(207,168,134,.05) 11px,rgba(207,168,134,.05) 22px)}

  /* ---------- Dashboard (light) ---------- */
  .dash{display:flex;flex-wrap:wrap;border:1px solid var(--rule);background:var(--paper)}
  .stat{flex:1;min-width:130px;text-align:center;padding:24px 14px;border-right:1px solid var(--rule)}
  .stat:last-child{border-right:none}
  .stat .n{font-family:var(--serif);font-size:34px;line-height:1;color:var(--sienna)}
  .stat .k{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--slate);margin-top:9px}
  .goal{flex-basis:100%;border-right:none;border-top:1px solid var(--rule);background:#e7dcc4;padding:18px 22px}
  .goal .k{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--sienna)}
  .goal .bar{height:3px;background:rgba(159,85,27,.18);margin-top:12px;max-width:560px}
  .goal .bar i{display:block;height:100%;background:var(--sienna);transition:width 1s cubic-bezier(.2,.8,.2,1)}

  /* ---------- Toolbar ---------- */
  .toolbar{display:flex;flex-wrap:wrap;gap:16px;align-items:center;margin:42px 0 10px}
  .toolbar .search{flex:1;min-width:220px;position:relative}
  .search input{width:100%;font-family:var(--serif);font-size:18px;font-style:italic;color:var(--ink);
        background:var(--ivory);border:1px solid var(--rule);padding:13px 16px;outline:none;border-radius:0}
  .search input::placeholder{color:var(--tan);font-style:italic}
  .search input:focus{border-color:var(--sienna)}
  .filters{display:flex;gap:0;border:1px solid var(--rule)}
  .chip{font-family:var(--sans);font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:10px 14px;
        background:transparent;color:var(--slate);cursor:pointer;border:none;border-right:1px solid var(--rule);transition:.15s}
  .chip:last-child{border-right:none}
  .chip:hover{color:var(--sienna)}
  .chip.on{background:var(--ink);color:var(--ivory)}
  .add{font-family:var(--sans);font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:12px 22px;
       border:1px solid var(--ink);background:var(--ink);color:var(--ivory);cursor:pointer;transition:.18s}
  .add:hover{background:var(--sienna);border-color:var(--sienna)}

  /* ---------- Ledger ---------- */
  .ledger-head{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--tan);
        display:flex;justify-content:space-between;padding:0 4px 10px;border-bottom:1px solid var(--ink);margin-top:6px}
  .ledger{border-top:none}
  .entry{border-bottom:1px solid var(--rule);padding:22px 4px;display:grid;
         grid-template-columns:96px 1fr 200px 96px;gap:22px;align-items:center;cursor:pointer;transition:.16s}
  .entry:hover{background:var(--paper);padding-left:14px;padding-right:14px}
  .entry .acc{font-family:var(--sans);font-size:12px;letter-spacing:.08em;color:var(--tan)}
  .entry .who .nm{font-family:var(--serif);font-size:31px;line-height:1.05;transition:.16s}
  .entry:hover .who .nm{color:var(--sienna)}
  .entry .who .nm .star{color:var(--verm);font-size:18px;margin-left:9px;vertical-align:2px}
  .entry .who .pieces{font-family:var(--sans);font-size:11px;letter-spacing:.04em;color:var(--slate);margin-top:6px}
  .entry .lives{font-style:italic;font-size:16px;color:var(--slate)}
  .entry .sig{text-align:right;font-family:var(--sans);font-size:10px;letter-spacing:.12em;text-transform:uppercase}
  .sig .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-left:8px;vertical-align:middle}
  .sig.High{color:var(--sienna)} .sig.High .dot{background:var(--sienna)}
  .sig.Med .dot{background:var(--tan)} .sig.Low .dot{background:var(--rule)}
  .empty{text-align:center;padding:90px 20px;color:var(--slate);font-style:italic;font-size:21px}

  /* ---------- Bottom actions ---------- */
  .actions{margin-top:26px;display:flex;gap:0;justify-content:flex-end;border:1px solid var(--rule);width:fit-content;margin-left:auto}
  .actions button{font-family:var(--sans);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
        padding:9px 15px;background:transparent;border:none;border-right:1px solid var(--rule);color:var(--slate);cursor:pointer}
  .actions button:last-child{border-right:none}
  .actions button:hover{color:var(--sienna);background:var(--paper)}

  /* ---------- Footer (the only logomark on the page) ---------- */
  .foot{text-align:center;margin-top:80px;padding-top:28px;border-top:1px solid var(--rule)}
  .foot img{width:30px;opacity:.5;margin-bottom:13px}
  .foot .line{font-family:var(--sans);font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--tan)}

  /* ---------- Modal ---------- */
  .scrim{position:fixed;inset:0;background:rgba(40,37,35,.5);display:none;align-items:flex-start;justify-content:center;
         padding:44px 20px;overflow:auto;z-index:50;backdrop-filter:blur(2px)}
  .scrim.show{display:flex}
  .card{background:var(--ivory);max-width:700px;width:100%;border:1px solid var(--rule);box-shadow:0 30px 70px var(--shadow);position:relative}
  .card-body{padding:46px 50px 30px}
  .card h2{font-family:var(--serif);font-size:54px;line-height:1;letter-spacing:.01em;margin:0 0 8px;max-width:80%}
  .card .acc-line{font-family:var(--sans);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--tan);margin-bottom:30px}
  .fields{display:grid;grid-template-columns:1fr 1fr;gap:0 34px}
  .field{padding:13px 0;border-bottom:1px solid var(--rule)}
  .field.full{grid-column:1/-1}
  .field label{display:block;font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--slate);margin-bottom:6px}
  .field .val{font-size:18px;min-height:23px}
  .field .val:empty::before{content:"—";color:var(--rule)}
  .field .val.script{font-style:italic;font-size:21px;line-height:1.35}
  .card-actions{display:flex;justify-content:space-between;gap:10px;padding:18px 50px 38px}

  /* ---------- Form ---------- */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px 34px;padding:6px 50px 12px}
  .fg{display:flex;flex-direction:column} .fg.full{grid-column:1/-1}
  .fg label{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--slate);margin-bottom:7px}
  .fg input,.fg select,.fg textarea{font-family:var(--serif);font-size:18px;color:var(--ink);background:transparent;
        border:none;border-bottom:1px solid var(--rule);padding:7px 2px;outline:none;border-radius:0}
  .fg textarea{font-style:italic;resize:vertical;min-height:46px;line-height:1.4}
  .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--sienna)}

  .btn{font-family:var(--sans);font-size:11px;letter-spacing:.13em;text-transform:uppercase;padding:11px 22px;
       border:1px solid var(--ink);background:var(--ink);color:var(--ivory);cursor:pointer;transition:.18s}
  .btn:hover{background:var(--sienna);border-color:var(--sienna)}
  .btn.ghost{background:transparent;color:var(--ink)}
  .btn.ghost:hover{color:var(--sienna);border-color:var(--sienna);background:transparent}

  /* ---------- Gate (light) ---------- */
  .gate{position:fixed;inset:0;background:var(--ivory);display:none;align-items:center;justify-content:center;z-index:80}
  .gate.show{display:flex}
  .gate .inner{position:relative;text-align:center;max-width:340px;padding:30px}
  .gate img.logo{width:230px;max-width:80%;margin-bottom:14px}
  .gate .crest{font-family:var(--sans);font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--tan);margin-bottom:30px}
  .gate input{width:100%;text-align:center;font-family:var(--serif);font-size:18px;font-style:italic;color:var(--ink);
        background:transparent;border:none;border-bottom:1px solid var(--rule);padding:11px;margin-bottom:16px;outline:none}
  .gate input::placeholder{color:var(--tan)}
  .gate input:focus{border-color:var(--sienna)}
  .gate .btn{width:100%}
  .gate .msg{font-family:var(--sans);font-size:11px;letter-spacing:.04em;color:var(--sienna);min-height:20px;margin-top:16px}

  @media(max-width:720px){
    .entry{grid-template-columns:1fr;gap:6px} .entry .acc,.entry .sig{text-align:left}
    .fields,.form-grid{grid-template-columns:1fr}
    .card h2{font-size:38px}
    .ledger-head{display:none}
  }
</style>
</head>

<div class="sync" id="sync"><span class="led"></span><span id="syncTxt">Local mode</span></div>

<div class="wrap">

  <header class="mast">
    <!-- TOP SECTION PLACEHOLDER — replace this whole <header> with your header image, e.g.:

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const STORE = "macon_archive_v1";
const SIG_ORDER = {High:0, Med:1, Low:2, "":3};
const COLS = ["acc","name","email","first_contact","pieces","gift_self","first_buy",
  "last_buy","why","lives","details","signal","first_look","last_contact","story","notes"];

const SEED = [
  {acc:"M-001", name:"Nick Bryciewicz", email:"nick@example.com", first_contact:"Commission / word of mouth",
   pieces:"Custom totems (~100)", first_buy:"2024-09", last_buy:"2025-03", gift_self:"Gift",
   why:"Wanted connection symbols to give to people in his life",
   lives:"Distributed to ~100 friends & collaborators",
   details:"Commissioned the original ~100 totems as connection symbols. The proof the collector model works.",
   signal:"High", first_look:true, last_contact:"2026-06-02", story:"Yes", notes:"Anchor case study. Treat as patron."},
  {acc:"M-014", name:"Maya", email:"maya@example.com", first_contact:"Instagram",
   pieces:"Ren, Pip", first_buy:"2025-01", last_buy:"2025-08", gift_self:"Self",
   why:"Drawn to the horse — said it felt like a steward",
   lives:"On her studio windowsill, morning light",
   details:"Ceramicist in Oregon. Bought a second piece after a hard year. Said Ren 'holds magic.'",
   signal:"High", first_look:true, last_contact:"2026-06-05", story:"Yes", notes:"Repeat buyer. Prime First Look."},
  {acc:"M-022", name:"James", email:"james@example.com", first_contact:"Friend referral (Maya)",
   pieces:"Lunar Canyon", first_buy:"2025-05", last_buy:"2025-05", gift_self:"Gift",
   why:"Engagement gift for his partner", lives:"Worn daily by his fiancée",
   details:"Getting married autumn 2026. Referred by Maya.",
   signal:"Med", first_look:false, last_contact:"2026-05-28", story:"Asked", notes:"Follow up after the wedding."},
];

let data = [];
let filter = "all";
let query = "";
let sb = null;
let synced = false;

/* ---------------- Storage layer ---------------- */
const local = {
  load(){ try{ const r=JSON.parse(localStorage.getItem(STORE)); if(Array.isArray(r)) return r; }catch(e){} return SEED.slice(); },
  save(){ localStorage.setItem(STORE, JSON.stringify(data)); }
};

async function boot(){
  if(CONFIG.SUPABASE_URL && CONFIG.SUPABASE_ANON_KEY && window.supabase){
    sb = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    const { data:{ session } } = await sb.auth.getSession();
    if(session) startSynced(); else showGate();
    sb.auth.onAuthStateChange((_e, s)=>{ if(s) startSynced(); else showGate(); });
  } else {
    data = local.load(); synced=false; setSync("local","Local mode");
    renderAll();
  }
}

async function startSynced(){
  hideGate(); synced=true; setSync("on","Synced");
  await refresh();
  sb.channel("collectors-rt")
    .on("postgres_changes",{event:"*",schema:"public",table:"collectors"}, ()=>refresh())
    .subscribe();
}

async function refresh(){
  if(!synced){ data=local.load(); renderAll(); return; }
  const { data:rows, error } = await sb.from("collectors").select("*").order("acc");
  if(error){ setSync("local","Sync error — check setup"); return; }
  data = rows || [];
  renderAll();
}

async function persist(rec, isNew){
  if(!synced){
    if(isNew) data.push(rec); else { const i=data.findIndex(d=>d.acc===rec.acc); if(i>=0) data[i]=rec; }
    local.save(); renderAll(); return;
  }
  const payload = {}; COLS.forEach(c=> payload[c]=rec[c]);
  if(rec.id) payload.id = rec.id;
  const { error } = await sb.from("collectors").upsert(payload, { onConflict: rec.id ? "id" : "acc" });
  if(error) alert("Could not save: "+error.message);
  await refresh();
}

async function removeRec(rec){
  if(!synced){ data = data.filter(d=>d.acc!==rec.acc); local.save(); renderAll(); return; }
  const q = rec.id ? sb.from("collectors").delete().eq("id",rec.id)
                   : sb.from("collectors").delete().eq("acc",rec.acc);
  const { error } = await q;
  if(error) alert("Could not remove: "+error.message);
  await refresh();
}

/* ---------------- Helpers ---------------- */
function countPieces(p){ if(!p||!p.trim()) return 0; return p.split(",").map(s=>s.trim()).filter(Boolean).length; }
function nextAcc(){ let max=0; data.forEach(d=>{ const m=/M-(\d+)/.exec(d.acc||""); if(m) max=Math.max(max,+m[1]); }); return "M-"+String(max+1).padStart(3,"0"); }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function setSync(cls,txt){ const el=document.getElementById("sync"); el.className="sync "+cls; document.getElementById("syncTxt").textContent=txt; }

/* ---------------- Dashboard ---------------- */
function renderDash(){
  const total=data.length;
  const high=data.filter(d=>d.signal==="High").length;
  const fl=data.filter(d=>d.first_look).length;
  const gifts=data.filter(d=>d.gift_self==="Gift").length;
  const pieces=data.reduce((s,d)=>s+countPieces(d.pieces),0);
  const pct=Math.min(100, Math.round(total/200*100));
  document.getElementById("dash").innerHTML=`
    <div class="stat"><div class="n">${total}</div><div class="k">Collectors</div></div>
    <div class="stat"><div class="n">${high}</div><div class="k">High Signal</div></div>
    <div class="stat"><div class="n">${fl}</div><div class="k">First Look</div></div>
    <div class="stat"><div class="n">${gifts}</div><div class="k">Gifts Given</div></div>
    <div class="stat"><div class="n">${pieces}</div><div class="k">Pieces in the World</div></div>
    <div class="goal"><div class="k">Toward 200 collectors who are genuinely in the world — ${total} / 200</div>
      <div class="bar"><i style="width:${pct}%"></i></div></div>`;
}

/* ---------------- Ledger ---------------- */
function renderLedger(){
  let rows=data.slice();
  if(filter==="firstlook") rows=rows.filter(d=>d.first_look);
  else if(filter!=="all") rows=rows.filter(d=>d.signal===filter);
  if(query){ const q=query.toLowerCase();
    rows=rows.filter(d=>[d.name,d.pieces,d.lives,d.details,d.why,d.notes,d.acc].some(v=>(v||"").toLowerCase().includes(q))); }
  rows.sort((a,b)=>(SIG_ORDER[a.signal]??3)-(SIG_ORDER[b.signal]??3)||(a.acc||"").localeCompare(b.acc||""));
  const host=document.getElementById("ledger");
  if(!rows.length){ host.innerHTML=`<div class="empty">No entries yet. The archive begins with the first name you add.</div>`; return; }
  host.innerHTML=rows.map(d=>{ const i=data.indexOf(d);
    return `<div class="entry" data-i="${i}">
      <div class="acc">${esc(d.acc)}</div>
      <div class="who"><div class="nm">${esc(d.name||"—")}${d.first_look?'<span class="star">★</span>':''}</div>
        <div class="pieces">${esc(d.pieces||"—")}</div></div>
      <div class="lives">${esc(d.lives||"")}</div>
      <div class="sig ${d.signal||''}">${esc(d.signal||"")}<span class="dot"></span></div>
    </div>`; }).join("");
  host.querySelectorAll(".entry").forEach(el=>el.onclick=()=>showCard(+el.dataset.i));
}

/* ---------------- Detail card ---------------- */
function showCard(i){
  const d=data[i]; const host=document.getElementById("cardHost");
  host.innerHTML=`
    <div class="card-body">
      <h2>${esc(d.name||"—")}</h2>
      <div class="acc-line">${esc(d.acc)} &nbsp;·&nbsp; ${esc(d.signal||"unrated")}${d.first_look?' &nbsp;·&nbsp; First Look ★':''}</div>
      <div class="fields">
        <div class="field"><label>Pieces Owned</label><div class="val">${esc(d.pieces)}</div></div>
        <div class="field"><label>Total Pieces</label><div class="val">${countPieces(d.pieces)||""}</div></div>
        <div class="field"><label>Gift or Self</label><div class="val">${esc(d.gift_self)}</div></div>
        <div class="field"><label>First Contact</label><div class="val">${esc(d.first_contact)}</div></div>
        <div class="field"><label>First Purchase</label><div class="val">${esc(d.first_buy)}</div></div>
        <div class="field"><label>Last Purchase</label><div class="val">${esc(d.last_buy)}</div></div>
        <div class="field full"><label>Why They Chose It</label><div class="val script">${esc(d.why)}</div></div>
        <div class="field full"><label>Where It Lives</label><div class="val script">${esc(d.lives)}</div></div>
        <div class="field full"><label>Personal Details — remember this</label><div class="val">${esc(d.details)}</div></div>
        <div class="field"><label>Email</label><div class="val">${esc(d.email)}</div></div>
        <div class="field"><label>Last Contacted</label><div class="val">${esc(d.last_contact)}</div></div>
        <div class="field"><label>Story Usable?</label><div class="val">${esc(d.story)}</div></div>
        <div class="field"><label>&nbsp;</label><div class="val"></div></div>
        <div class="field full"><label>Notes</label><div class="val">${esc(d.notes)}</div></div>
      </div>
    </div>
    <div class="card-actions">
      <button class="btn ghost" id="delBtn">Remove</button>
      <div><button class="btn ghost" id="closeBtn">Close</button>
      <button class="btn" id="editBtn">Edit</button></div>
    </div>`;
  openScrim();
  host.querySelector("#closeBtn").onclick=closeScrim;
  host.querySelector("#editBtn").onclick=()=>showForm(i);
  host.querySelector("#delBtn").onclick=()=>{ if(confirm("Remove "+(d.name||d.acc)+" from the archive?")){ removeRec(d); closeScrim(); } };
}

/* ---------------- Form ---------------- */
function showForm(i){
  const isNew=i==null;
  const d=isNew?{acc:nextAcc(),signal:"Med",gift_self:"Self",story:"Asked",first_look:false}:data[i];
  const host=document.getElementById("cardHost");
  const F=(k)=>esc(d[k]!=null?d[k]:"");
  host.innerHTML=`
    <div class="card-body"><h2>${isNew?"New Entry":"Edit"}</h2><div class="acc-line">${esc(d.acc)}</div></div>
    <div class="form-grid">
      <div class="fg"><label>Name</label><input id="f_name" value="${F('name')}"></div>
      <div class="fg"><label>Email</label><input id="f_email" value="${F('email')}"></div>
      <div class="fg full"><label>Pieces Owned (comma separated)</label><input id="f_pieces" value="${F('pieces')}"></div>
      <div class="fg"><label>First Contact</label><input id="f_first_contact" value="${F('first_contact')}"></div>
      <div class="fg"><label>Gift or Self</label><select id="f_gift_self">${opt(['Self','Gift'],d.gift_self)}</select></div>
      <div class="fg"><label>First Purchase</label><input id="f_first_buy" value="${F('first_buy')}" placeholder="2025-01"></div>
      <div class="fg"><label>Last Purchase</label><input id="f_last_buy" value="${F('last_buy')}" placeholder="2025-08"></div>
      <div class="fg full"><label>Why They Chose It</label><textarea id="f_why">${F('why')}</textarea></div>
      <div class="fg full"><label>Where It Lives</label><textarea id="f_lives">${F('lives')}</textarea></div>
      <div class="fg full"><label>Personal Details (remember this)</label><textarea id="f_details">${F('details')}</textarea></div>
      <div class="fg"><label>Signal</label><select id="f_signal">${opt(['High','Med','Low'],d.signal)}</select></div>
      <div class="fg"><label>First Look list?</label><select id="f_first_look">${opt(['Yes','No'],d.first_look?'Yes':'No')}</select></div>
      <div class="fg"><label>Last Contacted</label><input id="f_last_contact" value="${F('last_contact')}" placeholder="2026-06"></div>
      <div class="fg"><label>Story Usable?</label><select id="f_story">${opt(['Asked','Yes','No'],d.story)}</select></div>
      <div class="fg full"><label>Notes</label><textarea id="f_notes">${F('notes')}</textarea></div>
    </div>
    <div class="card-actions"><button class="btn ghost" id="cancelBtn">Cancel</button>
    <button class="btn" id="saveBtn">Save to Archive</button></div>`;
  openScrim();
  host.querySelector("#cancelBtn").onclick=()=>isNew?closeScrim():showCard(i);
  host.querySelector("#saveBtn").onclick=()=>{
    const g=id=>host.querySelector("#"+id).value.trim();
    const rec={acc:d.acc, id:d.id, name:g("f_name"), email:g("f_email"), pieces:g("f_pieces"),
      first_contact:g("f_first_contact"), gift_self:g("f_gift_self"), first_buy:g("f_first_buy"),
      last_buy:g("f_last_buy"), why:g("f_why"), lives:g("f_lives"), details:g("f_details"),
      signal:g("f_signal"), first_look:g("f_first_look")==="Yes", last_contact:g("f_last_contact"),
      story:g("f_story"), notes:g("f_notes")};
    persist(rec, isNew); closeScrim();
  };
}
function opt(arr,sel){ return arr.map(v=>`<option ${v===sel?'selected':''}>${v}</option>`).join(""); }

/* ---------------- Scrim & gate ---------------- */
function openScrim(){ document.getElementById("scrim").classList.add("show"); }
function closeScrim(){ document.getElementById("scrim").classList.remove("show"); }
function showGate(){ synced=false; setSync("","Sign in to sync"); document.getElementById("gate").classList.add("show"); }
function hideGate(){ document.getElementById("gate").classList.remove("show"); }
document.getElementById("scrim").onclick=e=>{ if(e.target.id==="scrim") closeScrim(); };
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeScrim(); });
async function gateSignIn(){
  const email=document.getElementById("gateEmail").value.trim();
  const password=document.getElementById("gatePass").value;
  if(!email||!password){ document.getElementById("gateMsg").textContent="Enter your email and password."; return; }
  document.getElementById("gateMsg").textContent="Opening…";
  const { error } = await sb.auth.signInWithPassword({ email, password });
  document.getElementById("gateMsg").textContent = error ? error.message : "";
}
document.getElementById("gateBtn").onclick=gateSignIn;
document.getElementById("gatePass").addEventListener("keydown",e=>{ if(e.key==="Enter") gateSignIn(); });

/* ---------------- Toolbar ---------------- */
document.getElementById("addBtn").onclick=()=>showForm(null);
document.getElementById("q").oninput=e=>{ query=e.target.value; renderLedger(); };
document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{
  document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
  c.classList.add("on"); filter=c.dataset.sig; renderLedger();
});

/* ---------------- Import / Export ---------------- */
document.getElementById("exportJson").onclick=()=>download("macon_archive.json", JSON.stringify(data,null,2),"application/json");
document.getElementById("exportCsv").onclick=()=>{
  const head=COLS.join(",");
  const body=data.map(d=>COLS.map(c=>{ let v=d[c]; if(typeof v==="boolean") v=v?"Yes":"No"; v=(v==null?"":String(v));
    return '"'+v.replace(/"/g,'""')+'"'; }).join(",")).join("\n");
  download("macon_archive.csv", head+"\n"+body, "text/csv");
};
document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
document.getElementById("importFile").onchange=e=>{
  const f=e.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload=async()=>{ try{ const j=JSON.parse(r.result);
    if(!Array.isArray(j)){ alert("That file doesn't look like a Maçon archive."); return; }
    if(!confirm("Import "+j.length+" entries into the archive?")) return;
    if(synced){ for(const rec of j){ const p={}; COLS.forEach(c=>p[c]=rec[c]); await sb.from("collectors").upsert(p,{onConflict:"acc"}); } await refresh(); }
    else { data=j; local.save(); renderAll(); }
  }catch(err){ alert("Could not read that file."); } };
  r.readAsText(f);
};
function download(name,content,type){ const b=new Blob([content],{type}); const u=URL.createObjectURL(b);
  const a=document.createElement("a"); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u); }

function renderAll(){ renderDash(); renderLedger(); }
boot();
</script>
</body>
</html>
