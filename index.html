<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Maçon · Bureau of Provenance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#2b2622;
    --paper:#f4efe4;
    --bronze:#8c6a47;
    --bronze-deep:#6f5235;
    --slate:#6c6a63;
    --rule:#c9bba6;
    --seal:#9c4a3a;
    --high:#e9d9c2;
    --shadow:rgba(43,38,34,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Helvetica Neue",Arial,sans-serif;
    font-size:15px;
    line-height:1.55;
    font-weight:400;
    background-image:radial-gradient(circle at 20% 10%, rgba(0,0,0,.012) 0, transparent 60%),
                     radial-gradient(circle at 80% 80%, rgba(0,0,0,.012) 0, transparent 60%);
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1080px;margin:0 auto;padding:48px 32px 96px}
  .serif{font-family:"Cormorant Garamond",Georgia,serif}

  /* ---------- Masthead ---------- */
  header.mast{text-align:center;padding-bottom:28px;border-bottom:1px solid var(--rule);margin-bottom:8px}
  .crest{font-size:11px;letter-spacing:.34em;color:var(--bronze);text-transform:uppercase;margin:0 0 14px;font-weight:500;padding-left:.34em}
  .wordmark{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:54px;letter-spacing:.18em;margin:0;line-height:1;padding-left:.18em}
  .tagline{font-style:italic;color:var(--slate);font-size:15px;margin:12px 0 0;letter-spacing:.01em;font-family:"Cormorant Garamond",serif}

  /* ---------- Sync badge ---------- */
  .sync{position:fixed;top:14px;right:16px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;
        color:var(--slate);display:flex;align-items:center;gap:7px;z-index:40}
  .sync .led{width:8px;height:8px;border-radius:50%;background:var(--rule)}
  .sync.on .led{background:#5a8a5a}
  .sync.local .led{background:var(--bronze)}
  .sync a{color:var(--slate);cursor:pointer;border-bottom:1px solid var(--rule)}

  /* ---------- Dashboard ---------- */
  .dash{display:flex;flex-wrap:wrap;justify-content:center;gap:0;margin:30px 0 6px;border:1px solid var(--rule);background:rgba(255,255,255,.25)}
  .stat{flex:1;min-width:120px;text-align:center;padding:16px 12px;border-right:1px solid var(--rule)}
  .stat:last-child{border-right:none}
  .stat .num{font-family:"Cormorant Garamond",serif;font-size:36px;font-weight:600;color:var(--bronze-deep);line-height:1}
  .stat .lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--slate);margin-top:8px;font-weight:500}
  .goal{flex-basis:100%;border-right:none;border-top:1px solid var(--rule);background:var(--high);padding:14px}
  .goal .lbl{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--bronze-deep);font-weight:500}
  .goal .bar{height:6px;background:var(--paper);border:1px solid var(--rule);margin:10px auto 0;max-width:520px}
  .goal .bar i{display:block;height:100%;background:var(--bronze)}

  /* ---------- Toolbar ---------- */
  .toolbar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:34px 0 18px}
  .toolbar .search{flex:1;min-width:200px}
  input,select,textarea{font-family:"Inter",sans-serif;font-size:14px;color:var(--ink);background:rgba(255,255,255,.5);
        border:1px solid var(--rule);padding:9px 12px;border-radius:0;outline:none}
  input:focus,select:focus,textarea:focus{border-color:var(--bronze)}
  input.search{width:100%}
  .filters{display:flex;gap:6px}
  .chip{font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:8px 14px;border:1px solid var(--rule);
        background:transparent;color:var(--slate);cursor:pointer;transition:.15s;font-weight:500}
  .chip:hover{border-color:var(--bronze);color:var(--bronze)}
  .chip.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .btn{font-size:12px;letter-spacing:.12em;text-transform:uppercase;padding:10px 20px;border:1px solid var(--ink);
       background:var(--ink);color:var(--paper);cursor:pointer;transition:.15s;font-weight:500}
  .btn:hover{background:var(--bronze-deep);border-color:var(--bronze-deep)}
  .btn.ghost{background:transparent;color:var(--ink)}
  .btn.ghost:hover{color:var(--bronze);border-color:var(--bronze)}
  .btn.tiny{font-size:11px;padding:7px 13px;letter-spacing:.08em}

  /* ---------- Ledger ---------- */
  .ledger{border-top:1px solid var(--rule)}
  .entry{border-bottom:1px solid var(--rule);padding:18px 6px;display:grid;
         grid-template-columns:88px 1fr 150px 90px;gap:18px;align-items:baseline;cursor:pointer;transition:.12s}
  .entry:hover{background:rgba(255,255,255,.45)}
  .entry .acc{font-family:"Cormorant Garamond",serif;font-size:15px;letter-spacing:.08em;color:var(--bronze)}
  .entry .who .nm{font-family:"Cormorant Garamond",serif;font-size:24px;font-weight:500;line-height:1.1}
  .entry .who .pieces{color:var(--slate);font-size:13px;margin-top:4px}
  .entry .lives{font-size:13px;color:var(--slate);font-style:italic;font-family:"Cormorant Garamond",serif}
  .entry .sig{text-align:right;font-size:10px;letter-spacing:.14em;text-transform:uppercase;font-weight:500}
  .sig .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}
  .sig.High{color:var(--bronze-deep);font-weight:600}
  .sig.High .dot{background:var(--bronze)}
  .sig.Med .dot{background:var(--slate)}
  .sig.Low .dot{background:var(--rule)}
  .star{color:var(--seal);margin-left:6px}
  .empty{text-align:center;padding:70px 20px;color:var(--slate);font-style:italic;font-family:"Cormorant Garamond",serif;font-size:18px}

  /* ---------- Modal ---------- */
  .scrim{position:fixed;inset:0;background:rgba(43,38,34,.45);display:none;align-items:flex-start;justify-content:center;padding:40px 20px;overflow:auto;z-index:50}
  .scrim.show{display:flex}
  .card{background:var(--paper);max-width:680px;width:100%;border:1px solid var(--rule);box-shadow:0 24px 60px var(--shadow);position:relative}
  .card .seal{position:absolute;right:24px;top:22px;width:74px;height:74px;border:2px solid var(--seal);border-radius:50%;
        color:var(--seal);display:flex;align-items:center;justify-content:center;text-align:center;
        font-family:"Cormorant Garamond",serif;font-size:9px;letter-spacing:.1em;text-transform:uppercase;line-height:1.25;opacity:.7;transform:rotate(-8deg)}
  .card-body{padding:40px 44px 32px}
  .card h2{font-family:"Cormorant Garamond",serif;font-weight:600;font-size:40px;letter-spacing:.04em;margin:0 0 4px}
  .card .acc-line{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--bronze);margin-bottom:26px;font-weight:500}
  .fields{display:grid;grid-template-columns:1fr 1fr;gap:2px 28px}
  .field{padding:11px 0;border-bottom:1px solid var(--rule)}
  .field.full{grid-column:1/-1}
  .field label{display:block;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--slate);margin-bottom:5px;font-weight:600}
  .field .val{font-size:15px;min-height:21px}
  .field .val:empty::before{content:"—";color:var(--rule)}
  .field .val.script{font-style:italic;font-size:17px;font-family:"Cormorant Garamond",serif}
  .card-actions{display:flex;justify-content:space-between;gap:10px;padding:20px 44px 34px}

  /* ---------- Form ---------- */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 24px;padding:8px 44px 10px}
  .form-grid .fg{display:flex;flex-direction:column}
  .form-grid .fg.full{grid-column:1/-1}
  .form-grid label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--slate);margin-bottom:6px;font-weight:600}
  .form-grid textarea{resize:vertical;min-height:54px;font-family:"Inter",sans-serif}

  /* ---------- Sign-in gate ---------- */
  .gate{position:fixed;inset:0;background:var(--paper);display:none;align-items:center;justify-content:center;z-index:80}
  .gate.show{display:flex}
  .gate .inner{text-align:center;max-width:380px;padding:30px}
  .gate .wordmark{font-size:44px;margin-bottom:8px}
  .gate p{color:var(--slate);font-family:"Cormorant Garamond",serif;font-style:italic;font-size:17px;margin:0 0 26px}
  .gate input{width:100%;text-align:center;margin-bottom:14px;padding:12px}
  .gate .msg{font-size:13px;color:var(--bronze-deep);min-height:20px;margin-top:14px}

  .foot{text-align:center;margin-top:64px;padding-top:22px;border-top:1px solid var(--rule);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--bronze);font-weight:500}

  @media(max-width:680px){
    .entry{grid-template-columns:1fr;gap:4px}
    .entry .acc,.entry .sig{text-align:left}
    .fields,.form-grid{grid-template-columns:1fr}
    .wordmark{font-size:38px}
    .sync{position:static;justify-content:center;margin-bottom:10px}
  }
</style>
</head>
<body>

<div class="sync" id="sync"><span class="led"></span><span id="syncTxt">Local mode</span></div>

<div class="wrap">
  <header class="mast">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const STORE = "macon_archive_v1";
const SIG_ORDER = {High:0, Med:1, Low:2, "":3};
const COLS = ["acc","name","email","first_contact","pieces","gift_self","first_buy",
  "last_buy","why","lives","details","signal","first_look","last_contact","story","notes"];

const SEED = [
  {acc:"M-001", name:"Nick Bryciewicz", email:"nick@example.com", first_contact:"Commission / word of mouth",
   pieces:"Custom totems (~100)", first_buy:"2024-09", last_buy:"2025-03", gift_self:"Gift",
   why:"Wanted connection symbols to give to people in his life",
   lives:"Distributed to ~100 friends & collaborators",
   details:"Commissioned the original ~100 totems as connection symbols. The proof the collector model works.",
   signal:"High", first_look:true, last_contact:"2026-06-02", story:"Yes", notes:"Anchor case study. Treat as patron."},
  {acc:"M-014", name:"Maya", email:"maya@example.com", first_contact:"Instagram",
   pieces:"Ren, Pip", first_buy:"2025-01", last_buy:"2025-08", gift_self:"Self",
   why:"Drawn to the horse — said it felt like a steward",
   lives:"On her studio windowsill, morning light",
   details:"Ceramicist in Oregon. Bought a second piece after a hard year. Said Ren 'holds magic.'",
   signal:"High", first_look:true, last_contact:"2026-06-05", story:"Yes", notes:"Repeat buyer. Prime First Look."},
  {acc:"M-022", name:"James", email:"james@example.com", first_contact:"Friend referral (Maya)",
   pieces:"Lunar Canyon", first_buy:"2025-05", last_buy:"2025-05", gift_self:"Gift",
   why:"Engagement gift for his partner", lives:"Worn daily by his fiancée",
   details:"Getting married autumn 2026. Referred by Maya.",
   signal:"Med", first_look:false, last_contact:"2026-05-28", story:"Asked", notes:"Follow up after the wedding."},
];

let data = [];
let filter = "all";
let query = "";
let sb = null;           // supabase client
let synced = false;

/* ---------------- Storage layer ---------------- */
const local = {
  load(){ try{ const r=JSON.parse(localStorage.getItem(STORE)); if(Array.isArray(r)) return r; }catch(e){} return SEED.slice(); },
  save(){ localStorage.setItem(STORE, JSON.stringify(data)); }
};

async function boot(){
  if(CONFIG.SUPABASE_URL && CONFIG.SUPABASE_ANON_KEY && window.supabase){
    sb = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    const { data:{ session } } = await sb.auth.getSession();
    if(session) startSynced(); else showGate();
    sb.auth.onAuthStateChange((_e, s)=>{ if(s) startSynced(); else showGate(); });
  } else {
    data = local.load(); synced=false; setSync("local","Local mode");
    renderAll();
  }
}

async function startSynced(){
  hideGate(); synced=true; setSync("on","Synced");
  await refresh();
  sb.channel("collectors-rt")
    .on("postgres_changes",{event:"*",schema:"public",table:"collectors"}, ()=>refresh())
    .subscribe();
}

async function refresh(){
  if(!synced){ data=local.load(); renderAll(); return; }
  const { data:rows, error } = await sb.from("collectors").select("*").order("acc");
  if(error){ setSync("local","Sync error — check setup"); return; }
  data = rows || [];
  renderAll();
}

async function persist(rec, isNew){
  if(!synced){
    if(isNew) data.push(rec); else { const i=data.findIndex(d=>d.acc===rec.acc); if(i>=0) data[i]=rec; }
    local.save(); renderAll(); return;
  }
  const payload = {}; COLS.forEach(c=> payload[c]=rec[c]);
  if(rec.id) payload.id = rec.id;
  const { error } = await sb.from("collectors").upsert(payload, { onConflict: rec.id ? "id" : "acc" });
  if(error) alert("Could not save: "+error.message);
  await refresh();
}

async function removeRec(rec){
  if(!synced){ data = data.filter(d=>d.acc!==rec.acc); local.save(); renderAll(); return; }
  const q = rec.id ? sb.from("collectors").delete().eq("id",rec.id)
                   : sb.from("collectors").delete().eq("acc",rec.acc);
  const { error } = await q;
  if(error) alert("Could not remove: "+error.message);
  await refresh();
}

/* ---------------- Helpers ---------------- */
function countPieces(p){ if(!p||!p.trim()) return 0; return p.split(",").map(s=>s.trim()).filter(Boolean).length; }
function nextAcc(){ let max=0; data.forEach(d=>{ const m=/M-(\d+)/.exec(d.acc||""); if(m) max=Math.max(max,+m[1]); }); return "M-"+String(max+1).padStart(3,"0"); }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function setSync(cls,txt){ const el=document.getElementById("sync"); el.className="sync "+cls; document.getElementById("syncTxt").textContent=txt; }

/* ---------------- Dashboard ---------------- */
function renderDash(){
  const total=data.length;
  const high=data.filter(d=>d.signal==="High").length;
  const fl=data.filter(d=>d.first_look).length;
  const gifts=data.filter(d=>d.gift_self==="Gift").length;
  const pieces=data.reduce((s,d)=>s+countPieces(d.pieces),0);
  const pct=Math.min(100, Math.round(total/200*100));
  document.getElementById("dash").innerHTML=`
    <div class="stat"><div class="num">${total}</div><div class="lbl">Collectors</div></div>
    <div class="stat"><div class="num">${high}</div><div class="lbl">High Signal</div></div>
    <div class="stat"><div class="num">${fl}</div><div class="lbl">First Look</div></div>
    <div class="stat"><div class="num">${gifts}</div><div class="lbl">Gifts Given</div></div>
    <div class="stat"><div class="num">${pieces}</div><div class="lbl">Pieces in the World</div></div>
    <div class="goal"><div class="lbl">Toward 200 collectors who are genuinely in the world — ${total} / 200</div>
      <div class="bar"><i style="width:${pct}%"></i></div></div>`;
}

/* ---------------- Ledger ---------------- */
function renderLedger(){
  let rows=data.slice();
  if(filter==="firstlook") rows=rows.filter(d=>d.first_look);
  else if(filter!=="all") rows=rows.filter(d=>d.signal===filter);
  if(query){ const q=query.toLowerCase();
    rows=rows.filter(d=>[d.name,d.pieces,d.lives,d.details,d.why,d.notes,d.acc].some(v=>(v||"").toLowerCase().includes(q))); }
  rows.sort((a,b)=>(SIG_ORDER[a.signal]??3)-(SIG_ORDER[b.signal]??3)||(a.acc||"").localeCompare(b.acc||""));
  const host=document.getElementById("ledger");
  if(!rows.length){ host.innerHTML=`<div class="empty">No entries yet. The archive begins with the first name you add.</div>`; return; }
  host.innerHTML=rows.map(d=>{ const i=data.indexOf(d);
    return `<div class="entry" data-i="${i}">
      <div class="acc">${esc(d.acc)}</div>
      <div class="who"><div class="nm">${esc(d.name||"—")}${d.first_look?'<span class="star">★</span>':''}</div>
        <div class="pieces">${esc(d.pieces||"")}</div></div>
      <div class="lives">${esc(d.lives||"")}</div>
      <div class="sig ${d.signal||''}"><span class="dot"></span>${esc(d.signal||"")}</div>
    </div>`; }).join("");
  host.querySelectorAll(".entry").forEach(el=>el.onclick=()=>showCard(+el.dataset.i));
}

/* ---------------- Detail card ---------------- */
function showCard(i){
  const d=data[i]; const host=document.getElementById("cardHost");
  host.innerHTML=`
    <div class="seal">Maçon<br>Bureau of<br>Provenance</div>
    <div class="card-body">
      <h2>${esc(d.name||"—")}</h2>
      <div class="acc-line">${esc(d.acc)} &nbsp;·&nbsp; ${esc(d.signal||"unrated")}${d.first_look?' &nbsp;·&nbsp; First Look ★':''}</div>
      <div class="fields">
        <div class="field"><label>Pieces Owned</label><div class="val">${esc(d.pieces)}</div></div>
        <div class="field"><label>Total Pieces</label><div class="val">${countPieces(d.pieces)||""}</div></div>
        <div class="field"><label>Gift or Self</label><div class="val">${esc(d.gift_self)}</div></div>
        <div class="field"><label>First Contact</label><div class="val">${esc(d.first_contact)}</div></div>
        <div class="field"><label>First Purchase</label><div class="val">${esc(d.first_buy)}</div></div>
        <div class="field"><label>Last Purchase</label><div class="val">${esc(d.last_buy)}</div></div>
        <div class="field full"><label>Why They Chose It</label><div class="val script">${esc(d.why)}</div></div>
        <div class="field full"><label>Where It Lives</label><div class="val script">${esc(d.lives)}</div></div>
        <div class="field full"><label>Personal Details — remember this</label><div class="val">${esc(d.details)}</div></div>
        <div class="field"><label>Email</label><div class="val">${esc(d.email)}</div></div>
        <div class="field"><label>Last Contacted</label><div class="val">${esc(d.last_contact)}</div></div>
        <div class="field"><label>Story Usable?</label><div class="val">${esc(d.story)}</div></div>
        <div class="field"><label>&nbsp;</label><div class="val"></div></div>
        <div class="field full"><label>Notes</label><div class="val">${esc(d.notes)}</div></div>
      </div>
    </div>
    <div class="card-actions">
      <button class="btn ghost" id="delBtn">Remove</button>
      <div><button class="btn ghost" id="closeBtn">Close</button>
      <button class="btn" id="editBtn">Edit</button></div>
    </div>`;
  openScrim();
  host.querySelector("#closeBtn").onclick=closeScrim;
  host.querySelector("#editBtn").onclick=()=>showForm(i);
  host.querySelector("#delBtn").onclick=()=>{ if(confirm("Remove "+(d.name||d.acc)+" from the archive?")){ removeRec(d); closeScrim(); } };
}

/* ---------------- Form ---------------- */
function showForm(i){
  const isNew=i==null;
  const d=isNew?{acc:nextAcc(),signal:"Med",gift_self:"Self",story:"Asked",first_look:false}:data[i];
  const host=document.getElementById("cardHost");
  const F=(k)=>esc(d[k]!=null?d[k]:"");
  host.innerHTML=`
    <div class="card-body"><h2>${isNew?"New Entry":"Edit"}</h2><div class="acc-line">${esc(d.acc)}</div></div>
    <div class="form-grid">
      <div class="fg"><label>Name</label><input id="f_name" value="${F('name')}"></div>
      <div class="fg"><label>Email</label><input id="f_email" value="${F('email')}"></div>
      <div class="fg full"><label>Pieces Owned (comma separated)</label><input id="f_pieces" value="${F('pieces')}"></div>
      <div class="fg"><label>First Contact</label><input id="f_first_contact" value="${F('first_contact')}"></div>
      <div class="fg"><label>Gift or Self</label><select id="f_gift_self">${opt(['Self','Gift'],d.gift_self)}</select></div>
      <div class="fg"><label>First Purchase</label><input id="f_first_buy" value="${F('first_buy')}" placeholder="2025-01"></div>
      <div class="fg"><label>Last Purchase</label><input id="f_last_buy" value="${F('last_buy')}" placeholder="2025-08"></div>
      <div class="fg full"><label>Why They Chose It</label><textarea id="f_why">${F('why')}</textarea></div>
      <div class="fg full"><label>Where It Lives</label><textarea id="f_lives">${F('lives')}</textarea></div>
      <div class="fg full"><label>Personal Details (remember this)</label><textarea id="f_details">${F('details')}</textarea></div>
      <div class="fg"><label>Signal</label><select id="f_signal">${opt(['High','Med','Low'],d.signal)}</select></div>
      <div class="fg"><label>First Look list?</label><select id="f_first_look">${opt(['Yes','No'],d.first_look?'Yes':'No')}</select></div>
      <div class="fg"><label>Last Contacted</label><input id="f_last_contact" value="${F('last_contact')}" placeholder="2026-06"></div>
      <div class="fg"><label>Story Usable?</label><select id="f_story">${opt(['Asked','Yes','No'],d.story)}</select></div>
      <div class="fg full"><label>Notes</label><textarea id="f_notes">${F('notes')}</textarea></div>
    </div>
    <div class="card-actions"><button class="btn ghost" id="cancelBtn">Cancel</button>
    <button class="btn" id="saveBtn">Save to Archive</button></div>`;
  openScrim();
  host.querySelector("#cancelBtn").onclick=()=>isNew?closeScrim():showCard(i);
  host.querySelector("#saveBtn").onclick=()=>{
    const g=id=>host.querySelector("#"+id).value.trim();
    const rec={acc:d.acc, id:d.id, name:g("f_name"), email:g("f_email"), pieces:g("f_pieces"),
      first_contact:g("f_first_contact"), gift_self:g("f_gift_self"), first_buy:g("f_first_buy"),
      last_buy:g("f_last_buy"), why:g("f_why"), lives:g("f_lives"), details:g("f_details"),
      signal:g("f_signal"), first_look:g("f_first_look")==="Yes", last_contact:g("f_last_contact"),
      story:g("f_story"), notes:g("f_notes")};
    persist(rec, isNew); closeScrim();
  };
}
function opt(arr,sel){ return arr.map(v=>`<option ${v===sel?'selected':''}>${v}</option>`).join(""); }

/* ---------------- Scrim & gate ---------------- */
function openScrim(){ document.getElementById("scrim").classList.add("show"); }
function closeScrim(){ document.getElementById("scrim").classList.remove("show"); }
function showGate(){ synced=false; setSync("","Sign in to sync"); document.getElementById("gate").classList.add("show"); }
function hideGate(){ document.getElementById("gate").classList.remove("show"); }
document.getElementById("scrim").onclick=e=>{ if(e.target.id==="scrim") closeScrim(); };
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeScrim(); });
document.getElementById("gateBtn").onclick=async()=>{
  const email=document.getElementById("gateEmail").value.trim();
  if(!email){ return; }
  document.getElementById("gateMsg").textContent="Sending…";
  const { error } = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo: location.href.split('#')[0] } });
  document.getElementById("gateMsg").textContent = error ? error.message : "Check your email for the sign-in link.";
};

/* ---------------- Toolbar ---------------- */
document.getElementById("addBtn").onclick=()=>showForm(null);
document.getElementById("q").oninput=e=>{ query=e.target.value; renderLedger(); };
document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{
  document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
  c.classList.add("on"); filter=c.dataset.sig; renderLedger();
});

/* ---------------- Import / Export ---------------- */
document.getElementById("exportJson").onclick=()=>download("macon_archive.json", JSON.stringify(data,null,2),"application/json");
document.getElementById("exportCsv").onclick=()=>{
  const head=COLS.join(",");
  const body=data.map(d=>COLS.map(c=>{ let v=d[c]; if(typeof v==="boolean") v=v?"Yes":"No"; v=(v==null?"":String(v));
    return '"'+v.replace(/"/g,'""')+'"'; }).join(",")).join("\n");
  download("macon_archive.csv", head+"\n"+body, "text/csv");
};
document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
document.getElementById("importFile").onchange=e=>{
  const f=e.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload=async()=>{ try{ const j=JSON.parse(r.result);
    if(!Array.isArray(j)){ alert("That file doesn't look like a Maçon archive."); return; }
    if(!confirm("Import "+j.length+" entries into the archive?")) return;
    if(synced){ for(const rec of j){ const p={}; COLS.forEach(c=>p[c]=rec[c]); await sb.from("collectors").upsert(p,{onConflict:"acc"}); } await refresh(); }
    else { data=j; local.save(); renderAll(); }
  }catch(err){ alert("Could not read that file."); } };
  r.readAsText(f);
};
function download(name,content,type){ const b=new Blob([content],{type}); const u=URL.createObjectURL(b);
  const a=document.createElement("a"); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u); }

function renderAll(){ renderDash(); renderLedger(); }
boot();
</script>
</body>
</html>
